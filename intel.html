<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Link & Life | 專屬連結收藏</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&family=Comfortaa:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --bg-color: #fff9f6;
            --card-bg: #ffffff;
            --primary-color: #ff826e;
            --secondary-color: #fdd5bd;
            --text-main: #4a3a35;
            --text-sub: #8c736a;
            --accent-purple: #bc84ee;
            --radius: 20px;
            --shadow: 0 10px 25px rgba(255, 130, 110, 0.1);
        }

        * {
            box-sizing: border-box;
            font-family: 'Noto Sans TC', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        /* --- Header 區塊 --- */
        header {
            width: 100%;
            max-width: 800px;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }

        .profile-section {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 30px;
        }

        .avatar {
            width: 80px;
            height: 80px;
            background: var(--secondary-color);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            color: white;
            border: 4px solid white;
            box-shadow: var(--shadow);
        }

        .user-info h1 {
            font-family: 'Comfortaa', cursive;
            margin: 0;
            font-size: 28px;
        }

        .stats {
            display: flex;
            gap: 20px;
            margin-top: 10px;
            color: var(--text-sub);
            font-size: 14px;
        }

        /* --- 輸入表單 --- */
        .input-card {
            background: var(--card-bg);
            width: 90%;
            max-width: 600px;
            padding: 30px;
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            margin-bottom: 40px;
        }

        .input-group {
            margin-bottom: 15px;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: var(--text-sub);
        }

        input, select, textarea {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #f0f0f0;
            border-radius: 12px;
            font-size: 16px;
            outline: none;
            transition: 0.3s;
        }

        input:focus { border-color: var(--primary-color); }

        .row-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .btn-add {
            width: 100%;
            padding: 15px;
            background: var(--primary-color);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 10px;
        }

        .btn-add:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(255, 130, 110, 0.4); }

        /* --- 分類標籤 --- */
        .filter-bar {
            width: 90%;
            max-width: 800px;
            display: flex;
            gap: 10px;
            overflow-x: auto;
            padding: 10px 5px;
            margin-bottom: 20px;
        }

        .filter-btn {
            padding: 8px 20px;
            background: white;
            border: 2px solid var(--secondary-color);
            border-radius: 50px;
            cursor: pointer;
            white-space: nowrap;
            transition: 0.3s;
            font-weight: 500;
        }

        .filter-btn.active {
            background: var(--primary-color);
            color: white;
            border-color: var(--primary-color);
        }

        /* --- 展示區 (卡片牆) --- */
        .gallery {
            width: 90%;
            max-width: 1000px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 25px;
            padding-bottom: 50px;
        }

        .item-card {
            background: var(--card-bg);
            border-radius: var(--radius);
            overflow: hidden;
            box-shadow: var(--shadow);
            transition: 0.3s;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .item-card:hover { transform: translateY(-5px); }

        .card-img {
            width: 100%;
            height: 150px;
            background: var(--secondary-color);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 50px;
            color: white;
        }

        .card-content {
            padding: 20px;
        }

        .card-category {
            font-size: 12px;
            color: var(--primary-color);
            font-weight: 700;
            text-transform: uppercase;
            margin-bottom: 5px;
        }

        .card-title {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 10px;
        }

        .card-notes {
            font-size: 14px;
            color: var(--text-sub);
            background: #fff9f6;
            padding: 10px;
            border-radius: 10px;
            margin-bottom: 15px;
            line-height: 1.5;
        }

        .card-footer {
            margin-top: auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .link-btn {
            color: var(--primary-color);
            text-decoration: none;
            font-weight: 700;
            font-size: 14px;
        }

        .delete-btn {
            background: none;
            border: none;
            color: #ffcccc;
            cursor: pointer;
            transition: 0.3s;
        }

        .delete-btn:hover { color: #ff5e5e; }

        /* 分類管理小按鈕 */
        .manage-cat {
            font-size: 12px;
            color: var(--text-sub);
            text-decoration: underline;
            cursor: pointer;
            border: none;
            background: none;
        }

        /* 響應式調整 */
        @media (max-width: 600px) {
            .row-group { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <header>
        <div class="profile-section">
            <div class="avatar"><i class="fa-solid fa-heart"></i></div>
            <div class="user-info">
                <h1 id="display-name">My Collection</h1>
                <div class="stats">
                    <span id="count-all">0 收藏</span> • 
                    <span id="count-cat">0 分類</span>
                </div>
            </div>
        </div>

        <div class="input-card">
            <div class="input-group">
                <label>名稱 (美食名稱/小說名)</label>
                <input type="text" id="item-name" placeholder="想存什麼呢？">
            </div>
            <div class="input-group">
                <label>連結 URL (可不填)</label>
                <input type="url" id="item-url" placeholder="https://...">
            </div>
            <div class="row-group">
                <div class="input-group">
                    <label>選擇分類</label>
                    <select id="item-category">
                        </select>
                </div>
                <div class="input-group">
                    <label>自訂新分類</label>
                    <input type="text" id="new-category" placeholder="新增分類...">
                </div>
            </div>
            <div class="input-group">
                <label>小備註 / 註解</label>
                <textarea id="item-notes" rows="2" placeholder="寫點什麼筆記吧..."></textarea>
            </div>
            <button class="btn-add" onclick="addItem()"><i class="fa-solid fa-plus"></i> 儲存到我的收藏</button>
        </div>
    </header>

    <div class="filter-bar" id="filter-bar">
        </div>

    <main class="gallery" id="gallery">
        </main>

    <script>
        // --- 初始化資料 ---
        let collections = JSON.parse(localStorage.getItem('myLinks')) || [];
        let categories = JSON.parse(localStorage.getItem('myCategories')) || ['全部', '美食', '住宿', '小說', '購物'];
        let currentFilter = '全部';

        // --- 核心功能 ---

        // 1. 新增項目
        function addItem() {
            const name = document.getElementById('item-name').value;
            const url = document.getElementById('item-url').value;
            const notes = document.getElementById('item-notes').value;
            const customCat = document.getElementById('new-category').value.trim();
            let category = document.getElementById('item-category').value;

            if (!name) {
                alert('請至少填寫名稱喔！');
                return;
            }

            // 如果有填寫自訂分類，優先使用並加入清單
            if (customCat) {
                if (!categories.includes(customCat)) {
                    categories.push(customCat);
                }
                category = customCat;
            }

            const newItem = {
                id: Date.now(),
                name: name,
                url: url,
                category: category,
                notes: notes,
                date: new Date().toLocaleDateString()
            };

            collections.unshift(newItem); // 加到最前面
            saveData();
            clearForm();
            render();
        }

        // 2. 刪除項目
        function deleteItem(id) {
            if(confirm('確定要刪除這個收藏嗎？')) {
                collections = collections.filter(item => item.id !== id);
                saveData();
                render();
            }
        }

        // 3. 儲存到 LocalStorage
        function saveData() {
            localStorage.setItem('myLinks', JSON.stringify(collections));
            localStorage.setItem('myCategories', JSON.stringify(categories));
        }

        // 4. 清除表單
        function clearForm() {
            document.getElementById('item-name').value = '';
            document.getElementById('item-url').value = '';
            document.getElementById('item-notes').value = '';
            document.getElementById('new-category').value = '';
        }

        // --- 渲染畫面 ---

        function render() {
            renderFilterBar();
            renderSelectOptions();
            renderGallery();
            
            document.getElementById('count-all').innerText = `${collections.length} 收藏`;
            document.getElementById('count-cat').innerText = `${categories.length - 1} 分類`;
        }

        // 渲染下拉選單
        function renderSelectOptions() {
            const select = document.getElementById('item-category');
            select.innerHTML = categories.filter(c => c !== '全部').map(c => `
                <option value="${c}">${c}</option>
            `).join('');
        }

        // 渲染篩選標籤
        function renderFilterBar() {
            const bar = document.getElementById('filter-bar');
            bar.innerHTML = categories.map(c => `
                <button class="filter-btn ${currentFilter === c ? 'active' : ''}" onclick="setFilter('${c}')">
                    ${c}
                </button>
            `).join('');
        }

        function setFilter(cat) {
            currentFilter = cat;
            render();
        }

        // 渲染卡片牆
        function renderGallery() {
            const gallery = document.getElementById('gallery');
            const filteredData = currentFilter === '全部' 
                ? collections 
                : collections.filter(item => item.category === currentFilter);

            if (filteredData.length === 0) {
                gallery.innerHTML = `<p style="text-align:center; width:100%; color:#8c736a; padding:50px;">這裡目前空空的喔～</p>`;
                return;
            }

            gallery.innerHTML = filteredData.map(item => {
                const icon = getIcon(item.category);
                return `
                    <div class="item-card">
                        <div class="card-img" style="background: ${getCatColor(item.category)}">
                            <i class="${icon}"></i>
                        </div>
                        <div class="card-content">
                            <div class="card-category">${item.category}</div>
                            <div class="card-title">${item.name}</div>
                            ${item.notes ? `<div class="card-notes">${item.notes}</div>` : ''}
                            <div class="card-footer">
                                ${item.url ? `<a href="${item.url}" target="_blank" class="link-btn"><i class="fa-solid fa-arrow-up-right-from-square"></i> 開啟連結</a>` : '<span style="font-size:12px; color:#ccc;">純記錄</span>'}
                                <button class="delete-btn" onclick="deleteItem(${item.id})">
                                    <i class="fa-solid fa-trash-can"></i>
                                </button>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        // 輔助函式：根據分類給圖示
        function getIcon(cat) {
            switch(cat) {
                case '美食': return 'fa-solid fa-utensils';
                case '住宿': return 'fa-solid fa-bed';
                case '小說': return 'fa-solid fa-book';
                case '購物': return 'fa-solid fa-cart-shopping';
                default: return 'fa-solid fa-star';
            }
        }

        // 輔助函式：根據分類給顏色
        function getCatColor(cat) {
            const colors = {
                '美食': '#fdd5bd',
                '住宿': '#dcfd8b',
                '小說': '#bc84ee',
                '購物': '#ff826e'
            };
            return colors[cat] || '#e0e0e0';
        }

        // 初始執行
        render();

    </script>
</body>
</html>
