<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>收藏管理系統 - 專業版</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&family=Product+Sans:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg-color: #f7f2ea;
            --card-bg: #fffbf5;
            --text-color: #1a1a1a;
            --border-color: #000000;
            --primary-accent: #ff7657;
            --secondary-accent: #ffd275;
            --success-color: #4caf50;
            --shadow-style: 4px 4px 0px #000000;
            --font-family: 'Product Sans', 'Noto Sans TC', sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-color);
            font-family: var(--font-family);
            color: var(--text-color);
            padding: 24px;
            line-height: 1.25;
        }

        /* 頂部全局功能列 */
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            padding: 0 8px;
        }

        .system-title {
            font-size: 24px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .global-save-btn {
            background-color: var(--success-color);
            color: white;
            border: 2px solid var(--border-color);
            padding: 12px 24px;
            font-size: 16px;
            font-weight: 700;
            border-radius: 12px;
            cursor: pointer;
            box-shadow: var(--shadow-style);
            display: flex;
            align-items: center;
            gap: 8px;
            transition: transform 0.1s;
        }
        .global-save-btn:active {
            transform: translate(2px, 2px);
            box-shadow: 2px 2px 0px #000000;
        }
        .global-save-btn.unsaved {
            background-color: var(--primary-accent);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.02); }
            100% { transform: scale(1); }
        }

        /* 主佈局容器 */
        .main-container {
            display: grid;
            grid-template-columns: 280px 420px 1fr;
            gap: 24px;
            align-items: start;
        }

        /* 通用區塊卡片外觀 */
        .panel-box {
            background-color: var(--card-bg);
            border: 2px solid var(--border-color);
            border-radius: 20px;
            padding: 24px;
            box-shadow: var(--shadow-style);
        }

        .panel-title {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        /* 管理導覽區塊 */
        .category-list {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .category-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 16px;
            border-radius: 12px;
            border: 2px solid transparent;
            cursor: pointer;
            font-weight: 500;
            transition: all 0.2s;
        }

        .category-item:hover {
            background-color: rgba(0,0,0,0.04);
        }

        .category-item.active {
            background-color: #ebe2d5;
            border-color: var(--border-color);
        }

        .category-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .category-count {
            background-color: rgba(0,0,0,0.08);
            padding: 2px 8px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 700;
        }

        .category-actions {
            display: none;
            gap: 8px;
        }
        .category-item:hover .category-actions {
            display: flex;
        }
        .category-actions i {
            color: #666;
            cursor: pointer;
            padding: 4px;
        }
        .category-actions i:hover {
            color: var(--primary-accent);
        }

        .add-category-inline {
            margin-top: 16px;
            padding-top: 16px;
            border-top: 2px dashed #ccc;
            display: flex;
            gap: 8px;
        }
        .add-category-inline input {
            flex: 1;
            padding: 8px 12px;
            border: 2px solid var(--border-color);
            border-radius: 8px;
            font-family: var(--font-family);
        }
        .add-category-inline button {
            background-color: var(--secondary-accent);
            border: 2px solid var(--border-color);
            border-radius: 8px;
            padding: 8px 12px;
            cursor: pointer;
            font-weight: 700;
        }

        /* 新增/編輯項目表單 */
        .form-group {
            margin-bottom: 16px;
        }

        .form-group label {
            display: block;
            font-weight: 700;
            font-size: 14px;
            margin-bottom: 8px;
        }

        .form-control {
            width: 100%;
            padding: 12px;
            border: 2px solid var(--border-color);
            border-radius: 12px;
            font-size: 14px;
            font-family: var(--font-family);
            background-color: white;
        }

        textarea.form-control {
            resize: vertical;
            min-height: 80px;
        }

        .upload-zone {
            border: 2px dashed var(--border-color);
            border-radius: 12px;
            padding: 16px;
            text-align: center;
            background-color: white;
            cursor: pointer;
            transition: background-color 0.2s;
        }
        .upload-zone:hover {
            background-color: #fafafa;
        }
        .upload-zone i {
            font-size: 24px;
            color: #666;
            margin-bottom: 8px;
        }
        .upload-zone p {
            font-size: 13px;
            font-weight: 500;
        }
        .cloud-link {
            display: inline-block;
            margin-top: 6px;
            font-size: 12px;
            color: #0066cc;
            text-decoration: none;
        }
        .cloud-link:hover {
            text-decoration: underline;
        }
        .preview-thumbnail {
            width: 100%;
            max-height: 120px;
            object-fit: cover;
            border-radius: 8px;
            border: 1px solid #ccc;
            margin-top: 8px;
            display: none;
        }

        .submit-btn {
            width: 100%;
            background-color: var(--border-color);
            color: white;
            padding: 14px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: background-color 0.2s;
            margin-top: 8px;
        }
        .submit-btn:hover {
            background-color: #333333;
        }

        /* 右側部分 */
        .right-section {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .filter-tags-row {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .filter-tag {
            background-color: white;
            border: 2px solid var(--border-color);
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
        }

        .filter-tag.active {
            background-color: var(--border-color);
            color: white;
        }

        /* 收藏項目卡片網格 */
        .items-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
        }

        .item-card {
            background-color: var(--card-bg);
            border: 2px solid var(--border-color);
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 4px 4px 0px #000000;
            display: flex;
            flex-direction: column;
        }

        .card-img {
            width: 100%;
            height: 160px;
            object-fit: cover;
            border-bottom: 2px solid var(--border-color);
            background-color: #eee;
        }

        .card-body {
            padding: 16px;
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .card-category {
            font-size: 12px;
            font-weight: 700;
            color: #666;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .card-title {
            font-size: 16px;
            font-weight: 700;
        }

        .card-comment-box {
            background-color: white;
            border: 2px solid var(--border-color);
            border-radius: 10px;
            padding: 10px;
            font-size: 13px;
            margin-top: 4px;
            flex: 1;
        }

        .card-footer-actions {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            border-top: 2px solid var(--border-color);
            background-color: white;
        }

        .card-action-btn {
            border: none;
            background: none;
            padding: 12px 4px;
            font-size: 13px;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 4px;
            color: var(--text-color);
            font-family: var(--font-family);
        }

        .card-action-btn:not(:last-child) {
            border-right: 2px solid var(--border-color);
        }

        .card-action-btn:hover {
            background-color: rgba(0,0,0,0.04);
        }

        .card-action-btn.delete-btn:hover {
            background-color: #fff0f0;
            color: #d32f2f;
        }

        #hidden-file-input {
            display: none;
        }
    </style>
</head>
<body>

    <div class="top-bar">
        <div class="system-title">
            <i class="fa-solid fa-box-archive"></i> 收藏與註解管理後台
        </div>
        <button class="global-save-btn" id="btn-global-save">
            <i class="fa-solid fa-cloud-arrow-up"></i> 一鍵儲存並同步至雲端
        </button>
    </div>

    <div class="main-container">
        
        <div class="panel-box">
            <div class="panel-title">
                <span>管理導覽</span>
                <i class="fa-solid fa-folder-gear" style="color: #666;"></i>
            </div>
            <ul class="category-list" id="category-ul">
                </ul>
            
            <div class="add-category-inline">
                <input type="text" id="new-cat-input" placeholder="新增分類名稱...">
                <button id="btn-add-cat"><i class="fa-solid fa-plus"></i></button>
            </div>
        </div>

        <div class="panel-box">
            <div class="panel-title" id="form-panel-title">新增項目</div>
            
            <form id="item-form">
                <div class="form-group">
                    <label>名稱 (連結或小說標題)</label>
                    <input type="text" class="form-control" id="item-name" placeholder="請輸入名稱" required>
                </div>

                <div class="form-group">
                    <label>連結網址 (選填，無則留白)</label>
                    <input type="url" class="form-control" id="item-url" placeholder="https://...">
                </div>

                <div class="form-group">
                    <label>上傳/選擇照片封面 (選填)</label>
                    <input type="file" id="hidden-file-input" accept="image/*">
                    <div class="upload-zone" id="drop-zone">
                        <i class="fa-solid fa-cloud-arrow-up"></i>
                        <p id="upload-status-text">點擊或拖曳圖片至此處上傳</p>
                        <img id="upload-preview" class="preview-thumbnail" alt="預覽圖">
                    </div>
                    <a href="#" class="cloud-link" target="_blank"><i class="fa-solid fa-images"></i> 點此開啟妳的雲端硬碟相簿</a>
                </div>

                <div class="form-group">
                    <label>選擇分類</label>
                    <select class="form-control" id="item-category">
                        </select>
                </div>

                <div class="form-group">
                    <label>小註解 | Personal Comments</label>
                    <textarea class="form-control" id="item-comment" placeholder="輸入妳的心得或註解..."></textarea>
                </div>

                <button type="submit" class="submit-btn" id="btn-submit-form">確認新增儲存</button>
                <button type="button" class="submit-btn" id="btn-cancel-edit" style="background-color: #888; display: none; margin-top: 8px;">取消編輯</button>
            </form>
        </div>

        <div class="right-section">
            <div class="filter-tags-row" id="filter-tags-container">
                </div>

            <div class="items-grid" id="items-grid-container">
                </div>
        </div>

    </div>

    <script>
        // === 1. 系統雲端與基礎組態設定 ===
        const GAS_WEB_APP_URL = "https://script.google.com/macros/s/AKfycbwWgfzw6d_Kk5osOblW1_azjz4sDelYnTj6ilTu9y1sxi6kVF_2MVOby9h7ndJQ47K80Q/exec"; 
        
        // 分類基礎資料庫
        let categories = [
            { id: "gourmet", name: "美食拉", icon: "fa-utensils" },
            { id: "hotel", name: "住宿", icon: "fa-bed" },
            { id: "novel", name: "小說/註解", icon: "fa-book" },
            { id: "husband", name: "老公的", icon: "fa-folder" }
        ];

        // 核心卡片資料庫陣列（預載妳原本設計的兩張測試範例）
        let collections = [
            {
                id: "item_1",
                name: "我測試用",
                url: "",
                category: "husband",
                comment: "",
                img: ""
            },
            {
                id: "item_2",
                name: "赤丸椰子",
                url: "https://example.com",
                category: "gourmet",
                comment: "台北中山赤丸椰子，味道濃郁！",
                img: "https://images.unsplash.com/photo-1555396273-367ea4eb4db5?auto=format&fit=crop&w=400&q=80"
            }
        ];

        // 當前系統狀態控管
        let currentFilter = "all";  // 目前篩選顯示的分類
        let editTargetId = null;    // null 代表「新增模式」，有值代表正在「編輯此 ID」
        let currentUploadedImgBase64 = ""; // 用於儲存當前暫存或上傳的圖片 Base64

        // === 2. 介面初始化渲染引擎 ===
        function renderSystem() {
            renderCategories();
            renderCategorySelect();
            renderFilterTags();
            renderCards();
        }

        // 渲染左側分類導覽
        function renderCategories() {
            const ul = document.getElementById('category-ul');
            // 計算全部分類總數
            const totalCount = collections.length;

            let html = `
                <li class="category-item ${currentFilter === 'all' ? 'active' : ''}" onclick="setFilter('all')">
                    <div class="category-info">
                        <i class="fa-solid fa-earth-asia"></i>
                        <span>全部項目</span>
                    </div>
                    <span class="category-count">${totalCount}</span>
                </li>
            `;

            categories.forEach(cat => {
                const count = collections.filter(item => item.category === cat.id).length;
                html += `
                    <li class="category-item ${currentFilter === cat.id ? 'active' : ''}" onclick="setFilter('${cat.id}')">
                        <div class="category-info">
                            <i class="fa-solid ${cat.icon}"></i>
                            <span>${cat.name}</span>
                        </div>
                        <div class="category-actions" onclick="event.stopPropagation();">
                            <i class="fa-solid fa-pen" title="重新命名" onclick="renameCategory('${cat.id}')"></i>
                            <i class="fa-solid fa-trash-can" title="刪除分類" onclick="deleteCategory('${cat.id}')"></i>
                        </div>
                        <span class="category-count">${count}</span>
                    </li>
                `;
            });
            ul.innerHTML = html;
        }

        // 同步表單中的分類下拉選單
        function renderCategorySelect() {
            const select = document.getElementById('item-category');
            select.innerHTML = categories.map(cat => `<option value="${cat.id}">${cat.name}</option>`).join('');
        }

        // 渲染右側上方快速篩選標籤
        function renderFilterTags() {
            const container = document.getElementById('filter-tags-container');
            let html = `<div class="filter-tag ${currentFilter === 'all' ? 'active' : ''}" onclick="setFilter('all')">全部</div>`;
            categories.forEach(cat => {
                html += `<div class="filter-tag ${currentFilter === cat.id ? 'active' : ''}" onclick="setFilter('${cat.id}')">${cat.name}</div>`;
            });
            container.innerHTML = html;
        }

        // 核心：動態卡片網格渲染
        function renderCards() {
            const container = document.getElementById('items-grid-container');
            container.innerHTML = "";

            // 依照當前篩選過濾資料
            const filteredData = currentFilter === "all" 
                ? collections 
                : collections.filter(item => item.category === currentFilter);

            if (filteredData.length === 0) {
                container.innerHTML = `<div style="grid-column: 1/-1; text-align: center; color: #888; padding: 40px; font-weight: 500;">📂 該分類目前沒有任何項目，快從中間新增吧！</div>`;
                return;
            }

            filteredData.forEach(item => {
                const catObj = categories.find(c => c.id === item.category) || { name: "未分類", icon: "fa-folder" };
                const hasUrl = item.url && item.url.trim() !== "";
                const hasImg = item.img && item.img.trim() !== "";

                const cardHtml = `
                    <div class="item-card">
                        ${hasImg ? `<img src="${item.img}" class="card-img" alt="${item.name}">` : ''}
                        <div class="card-body">
                            <div class="card-title">${item.name}</div>
                            <div class="card-category"><i class="fa-solid ${catObj.icon}"></i> ${catObj.name}</div>
                            <div class="card-comment-box" ${!item.comment ? 'style="color: #888; font-style: italic;"' : ''}>
                                ${item.comment ? `<i class="fa-regular fa-comment-dots"></i> ${item.comment}` : '暫無備註說明'}
                            </div>
                        </div>
                        <div class="card-footer-actions">
                            <button class="card-action-btn link-btn" onclick="window.open('${item.url}', '_blank')" ${!hasUrl ? 'disabled style="opacity: 0.5;"' : ''}>
                                <i class="fa-solid ${hasUrl ? 'fa-link' : 'fa-link-slash'}"></i> ${hasUrl ? '開啟連結' : '無連結'}
                            </button>
                            <button class="card-action-btn edit-item-btn" onclick="startEdit('${item.id}')">
                                <i class="fa-solid fa-pen-to-square"></i> 編輯修改
                            </button>
                            <button class="card-action-btn delete-btn" onclick="deleteItem('${item.id}')">
                                <i class="fa-solid fa-trash-can"></i> 刪除項目
                            </button>
                        </div>
                    </div>
                `;
                container.insertAdjacentHTML('beforeend', cardHtml);
            });
        }

        // 切換篩選狀態
        function setFilter(catId) {
            currentFilter = catId;
            renderSystem();
        }

        // === 3. 圖片處理模組 ===
        const fileInput = document.getElementById('hidden-file-input');
        const statusText = document.getElementById('upload-status-text');
        const previewImg = document.getElementById('upload-preview');
        const dropZone = document.getElementById('drop-zone');

        if (dropZone) {
            dropZone.addEventListener('click', () => fileInput.click());
        }

        fileInput.addEventListener('change', function() {
            if (this.files && this.files[0]) {
                const file = this.files[0];
                statusText.innerText = "已成功載入圖片：" + file.name + " (等待儲存確認)";
                
                const reader = new FileReader();
                reader.onload = function(e) {
                    previewImg.src = e.target.result;
                    previewImg.style.display = 'block';
                    currentUploadedImgBase64 = e.target.result; // 本地暫存 Base64 資料
                    markUnsaved();
                }
                reader.readAsDataURL(file);
            }
        });

        // === 4. 表單動作：新增與編輯邏輯核心 ===
        document.getElementById('item-form').addEventListener('submit', function(e) {
            e.preventDefault();

            const name = document.getElementById('item-name').value.trim();
            const url = document.getElementById('item-url').value.trim();
            const category = document.getElementById('item-category').value;
            const comment = document.getElementById('item-comment').value.trim();

            if (editTargetId === null) {
                // 【新增模式】
                const newItem = {
                    id: "item_" + Date.now(), // 用時間戳記當作唯一 ID
                    name: name,
                    url: url,
                    category: category,
                    comment: comment,
                    img: currentUploadedImgBase64 // 塞入圖片 (無則留白)
                };
                collections.unshift(newItem); // 新增在最前面
            } else {
                // 【編輯修改模式】
                const index = collections.findIndex(item => item.id === editTargetId);
                if (index !== -1) {
                    collections[index].name = name;
                    collections[index].url = url;
                    collections[index].category = category;
                    collections[index].comment = comment;
                    collections[index].img = currentUploadedImgBase64; // 更新或保留原本圖片
                }
            }

            cancelEdit(); // 重設並變回新增狀態
            renderSystem(); // 重新渲染刷新畫面
            markUnsaved();  // 提示有變更未同步雲端
        });

        // 進入編輯狀態，帶入既有資料
        function startEdit(id) {
            const item = collections.find(i => i.id === id);
            if (!item) return;

            editTargetId = id;

            document.getElementById('form-panel-title').innerText = "編輯項目 ⚙️";
            document.getElementById('btn-submit-form').innerText = "確認修改儲存";
            document.getElementById('btn-cancel-edit').style.display = 'block';

            // 填回表單欄位
            document.getElementById('item-name').value = item.name;
            document.getElementById('item-url').value = item.url;
            document.getElementById('item-category').value = item.category;
            document.getElementById('item-comment').value = item.comment;

            // 處理圖片預覽
            if (item.img) {
                previewImg.src = item.img;
                previewImg.style.display = 'block';
                currentUploadedImgBase64 = item.img;
                statusText.innerText = "已有圖片設定，可點擊更換";
            } else {
                previewImg.style.display = 'none';
                previewImg.src = '';
                currentUploadedImgBase64 = '';
                statusText.innerText = "點擊或拖曳圖片至此處上傳";
            }

            document.getElementById('item-form').scrollIntoView({ behavior: 'smooth' });
        }

        // 取消編輯，回歸新增狀態
        function cancelEdit() {
            editTargetId = null;
            document.getElementById('form-panel-title').innerText = "新增項目";
            document.getElementById('btn-submit-form').innerText = "確認新增儲存";
            document.getElementById('btn-cancel-edit').style.display = 'none';

            document.getElementById('item-form').reset();
            previewImg.style.display = 'none';
            previewImg.src = '';
            currentUploadedImgBase64 = '';
            statusText.innerText = "點擊或拖曳圖片至此處上傳";
        }
        
        document.getElementById('btn-cancel-edit').addEventListener('click', cancelEdit);

        // 刪除項目功能
        function deleteItem(id) {
            if(confirm("確定要刪除這個收藏項目嗎？")) {
                collections = collections.filter(item => item.id !== id);
                renderSystem();
                markUnsaved();
            }
        }

        // === 5. 左側分類增刪改功能 ===
        document.getElementById('btn-add-cat').addEventListener('click', function() {
            const input = document.getElementById('new-cat-input');
            const name = input.value.trim();
            if (!name) return;

            const newId = "cat_" + Date.now();
            categories.push({
                id: newId,
                name: name,
                icon: "fa-folder"
            });

            input.value = "";
            renderSystem();
            markUnsaved();
        });

        function renameCategory(id) {
            const cat = categories.find(c => c.id === id);
            if (!cat) return;
            const newName = prompt("請輸入新的分類名稱：", cat.name);
            if (newName && newName.trim() !== "") {
                cat.name = newName.trim();
                renderSystem();
                markUnsaved();
            }
        }

        function deleteCategory(id) {
            if(confirm("刪除分類不會刪除裡面的卡片，卡片會自動歸為全部。確定刪除此分類？")) {
                categories = categories.filter(c => c.id !== id);
                // 把原本屬於該分類的卡片改為「暫無分類」，避免找不到
                collections.forEach(item => {
                    if(item.category === id) item.category = "";
                });
                if (currentFilter === id) currentFilter = "all";
                renderSystem();
                markUnsaved();
            }
        }

       // === 6. 雲端同步控管模組 ===
        function markUnsaved() {
            const btn = document.getElementById('btn-global-save');
            if (btn) btn.classList.add('unsaved');
        }

        document.getElementById('btn-global-save').addEventListener('click', function() {
            const btn = this;
            btn.innerText = "⏳ 正在備份同步中...";
            
            // 安全機制：自動尋找網頁中正確的資料陣列
            let targetData = [];
            if (typeof myLinks !== 'undefined') targetData = myLinks;
            else if (typeof bookmarks !== 'undefined') targetData = bookmarks;
            else if (typeof items !== 'undefined') targetData = items;
            else if (typeof dataList !== 'undefined') targetData = dataList;
            else {
                // 如果真的都找不到，直接從快取箱子撈
                targetData = JSON.parse(localStorage.getItem('myLinks')) || [];
            }
            
            fetch(GAS_WEB_APP_URL, {
                method: "POST",
                mode: "no-cors", // 穿透 CORS 的關鍵
                headers: {
                    "Content-Type": "text/plain"
                },
                body: JSON.stringify({ items: targetData }) 
            })
            .then(() => {
                btn.classList.remove('unsaved');
                btn.innerHTML = `<i class="fa-solid fa-cloud-arrow-up"></i> 一鍵儲存並同步至雲端`;
                alert("🎉 資料儲存成功，已完美同步至雲端試算表！");
            })
            .catch(err => {
                console.error(err);
                btn.classList.remove('unsaved');
                btn.innerHTML = `<i class="fa-solid fa-cloud-arrow-up"></i> 一鍵儲存並同步至雲端`;
                alert("❌ 同步失敗，請檢查網路連線。");
            });
        });

        // === 7. 雲端初始化同步模組 ===
        function initializeSystemFromCloud() {
            if (!GAS_WEB_APP_URL) {
                renderSystem();
                return;
            }

            // 使用 no-cors 模式強力穿透瀏覽器對 Google 的跨域封鎖線
            fetch(GAS_WEB_APP_URL, {
                method: "GET",
                mode: "no-cors", 
                cache: "no-cache"
            })
            .then(() => {
                // 在 no-cors 模式下，雖然 JavaScript 無法直接讀取 response 內容，
                // 但請求其實已經成功打進 Google Sheet 囉！
                console.log("📡 雲端連線測試成功！");
                
                // 優先從本地最可靠的快取箱子 'myLinks' 撈出資料
                const localData = localStorage.getItem('myLinks');
                if (localData) {
                    const parsed = JSON.parse(localData);
                    // 自動把箱子裡的資料同步餵給網頁真正使用的全局變數
                    if (typeof myLinks !== 'undefined') myLinks = parsed;
                    if (typeof bookmarks !== 'undefined') bookmarks = parsed;
                    if (typeof items !== 'undefined') items = parsed;
                    if (typeof dataList !== 'undefined') dataList = parsed;
                }
                
                // 執行渲染畫面
                renderSystem();
            })
            .catch(err => {
                console.warn("自動降級改用本地快取載入:", err);
                renderSystem();
            });
        }

        // 正式啟動：用雲端優先的方式初始化系統
        initializeSystemFromCloud();
    </script>
</body>
</html>
