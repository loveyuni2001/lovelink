<!DOCTYPE html>202606051242
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>收藏管理系統 - 專業版</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&family=Product+Sans:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg-color: #f7f2ea;
            --card-bg: #fffbf5;
            --text-color: #1a1a1a;
            --border-color: #000000;
            --primary-accent: #ff7657;
            --secondary-accent: #ffd275;
            --success-color: #4caf50;
            --shadow-style: 4px 4px 0px #000000;
            --font-family: 'Product Sans', 'Noto Sans TC', sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-color);
            font-family: var(--font-family);
            color: var(--text-color);
            padding: 24px;
            line-height: 1.25;
        }

        /* 頂部全局功能列 */
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            padding: 0 8px;
            gap: 16px;
        }

        .system-title {
            font-size: 24px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .global-save-btn {
            background-color: var(--success-color);
            color: white;
            border: 2px solid var(--border-color);
            padding: 12px 24px;
            font-size: 16px;
            font-weight: 700;
            border-radius: 12px;
            cursor: pointer;
            box-shadow: var(--shadow-style);
            display: flex;
            align-items: center;
            gap: 8px;
            transition: transform 0.1s;
            white-space: nowrap;
            flex-shrink: 0;
        }
        .global-save-btn:active {
            transform: translate(2px, 2px);
            box-shadow: 2px 2px 0px #000000;
        }
        .global-save-btn.unsaved {
            background-color: var(--primary-accent);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.02); }
            100% { transform: scale(1); }
        }

        /* 主佈局容器 (電腦版三欄並排) */
        .main-container {
            display: grid;
            grid-template-columns: 280px 420px 1fr;
            gap: 24px;
            align-items: start;
        }

        /* 通用區塊卡片外觀 */
        .panel-box {
            background-color: var(--card-bg);
            border: 2px solid var(--border-color);
            border-radius: 20px;
            padding: 24px;
            box-shadow: var(--shadow-style);
        }

        .panel-title {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        /* 管理導覽區塊 */
        .category-list {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .category-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 16px;
            border-radius: 12px;
            border: 2px solid transparent;
            cursor: pointer;
            font-weight: 500;
            transition: all 0.2s;
        }

        .category-item:hover {
            background-color: rgba(0,0,0,0.04);
        }

        .category-item.active {
            background-color: #ebe2d5;
            border-color: var(--border-color);
        }

        .category-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .category-count {
            background-color: rgba(0,0,0,0.08);
            padding: 2px 8px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 700;
        }

        .category-actions {
            display: none;
            gap: 8px;
        }
        .category-item:hover .category-actions {
            display: flex;
        }
        .category-actions i {
            color: #666;
            cursor: pointer;
            padding: 4px;
        }
        .category-actions i:hover {
            color: var(--primary-accent);
        }

        .add-category-inline {
            margin-top: 16px;
            padding-top: 16px;
            border-top: 2px dashed #ccc;
            display: flex;
            gap: 8px;
        }
        .add-category-inline input {
            flex: 1;
            padding: 8px 12px;
            border: 2px solid var(--border-color);
            border-radius: 8px;
            font-family: var(--font-family);
        }
        .add-category-inline button {
            background-color: var(--secondary-accent);
            border: 2px solid var(--border-color);
            border-radius: 8px;
            padding: 8px 12px;
            cursor: pointer;
            font-weight: 700;
        }

        /* 新增/編輯項目表單 */
        .form-group {
            margin-bottom: 16px;
        }

        .form-group label {
            display: block;
            font-weight: 700;
            font-size: 14px;
            margin-bottom: 8px;
        }

        .form-control {
            width: 100%;
            padding: 12px;
            border: 2px solid var(--border-color);
            border-radius: 12px;
            font-size: 14px;
            font-family: var(--font-family);
            background-color: white;
        }

        textarea.form-control {
            resize: vertical;
            min-height: 80px;
        }

        .upload-zone {
            border: 2px dashed var(--border-color);
            border-radius: 12px;
            padding: 16px;
            text-align: center;
            background-color: white;
            cursor: pointer;
            transition: background-color 0.2s;
        }
        .upload-zone:hover {
            background-color: #fafafa;
        }
        .upload-zone i {
            font-size: 24px;
            color: #666;
            margin-bottom: 8px;
        }
        .upload-zone p {
            font-size: 13px;
            font-weight: 500;
        }
        .cloud-link {
            display: inline-block;
            margin-top: 6px;
            font-size: 12px;
            color: #0066cc;
            text-decoration: none;
        }
        .cloud-link:hover {
            text-decoration: underline;
        }
        .preview-thumbnail {
            width: 100%;
            max-height: 120px;
            object-fit: cover;
            border-radius: 8px;
            border: 1px solid #ccc;
            margin-top: 8px;
            display: none;
        }

        .submit-btn {
            width: 100%;
            background-color: var(--border-color);
            color: white;
            padding: 14px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: background-color 0.2s;
            margin-top: 8px;
        }
        .submit-btn:hover {
            background-color: #333333;
        }

        /* 右側部分 */
        .right-section {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .filter-tags-row {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .filter-tag {
            background-color: white;
            border: 2px solid var(--border-color);
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
        }

        .filter-tag.active {
            background-color: var(--border-color);
            color: white;
        }

        /* 收藏項目卡片網格 */
        .items-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
        }

        .item-card {
            background-color: var(--card-bg);
            border: 2px solid var(--border-color);
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 4px 4px 0px #000000;
            display: flex;
            flex-direction: column;
        }

        .card-img {
            width: 100%;
            height: 160px;
            object-fit: cover;
            border-bottom: 2px solid var(--border-color);
            background-color: #eee;
        }

        .card-body {
            padding: 16px;
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .card-category {
            font-size: 12px;
            font-weight: 700;
            color: #666;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .card-title {
            font-size: 16px;
            font-weight: 700;
        }

        .card-comment-box {
            background-color: white;
            border: 2px solid var(--border-color);
            border-radius: 10px;
            padding: 10px;
            font-size: 13px;
            margin-top: 4px;
            flex: 1;
        }

        .card-footer-actions {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            border-top: 2px solid var(--border-color);
            background-color: white;
        }

        .card-action-btn {
            border: none;
            background: none;
            padding: 12px 4px;
            font-size: 13px;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 4px;
            color: var(--text-color);
            font-family: var(--font-family);
        }

        .card-action-btn:not(:last-child) {
            border-right: 2px solid var(--border-color);
        }

        .card-action-btn:hover {
            background-color: rgba(0,0,0,0.04);
        }

        .card-action-btn.delete-btn:hover {
            background-color: #fff0f0;
            color: #d32f2f;
        }

        #hidden-file-input {
            display: none;
        }

        /* 行動端 RWD 響應式 CSS 樣式 */
        @media (max-width: 992px) {
            body {
                padding: 12px;
            }

            .top-bar {
                flex-direction: column;
                align-items: stretch;
                gap: 12px;
                margin-bottom: 16px;
            }

            .system-title {
                font-size: 20px;
                justify-content: center;
            }

            .global-save-btn {
                width: 100%;
                justify-content: center;
                padding: 14px;
            }

            .main-container {
                grid-template-columns: 1fr; 
                gap: 16px;
            }

            .panel-box {
                padding: 16px;
                border-radius: 16px;
            }

            .category-actions {
                display: flex !important; 
            }

            .items-grid {
                grid-template-columns: 1fr;
                gap: 16px;
            }
        }
    </style>
</head>
<body>

    <div class="top-bar">
        <div class="system-title">
            <i class="fa-solid fa-box-archive"></i> 收藏與註解管理後台 (Lovelink版)
        </div>
        <button class="global-save-btn" id="btn-global-save">
            <i class="fa-solid fa-cloud-arrow-up"></i> 一鍵儲存並同步至雲端
        </button>
    </div>

    <div class="main-container">
        
        <div class="panel-box">
            <div class="panel-title">
                <span>管理導覽</span>
                <i class="fa-solid fa-folder-gear" style="color: #666;"></i>
            </div>
            <ul class="category-list" id="category-ul">
            </ul>
            
            <div class="add-category-inline">
                <input type="text" id="new-cat-input" placeholder="新增分類名稱...">
                <button id="btn-add-cat"><i class="fa-solid fa-plus"></i></button>
            </div>
        </div>

        <div class="panel-box">
            <div class="form-panel-title" id="form-panel-title" style="font-size: 18px; font-weight: 700; margin-bottom: 20px;">新增項目</div>
            
            <form id="item-form">
                <div class="form-group">
                    <label>名稱 (連結或小說標題)</label>
                    <input type="text" class="form-control" id="item-name" placeholder="請輸入名稱" required>
                </div>

                <div class="form-group">
                    <label>連結網址 (選填，無則留白)</label>
                    <input type="url" class="form-control" id="item-url" placeholder="https://...">
                </div>

                <div class="form-group">
                    <label>上傳/選擇照片封面 (選填)</label>
                    <input type="file" id="hidden-file-input" accept="image/*">
                    <div class="upload-zone" id="drop-zone">
                        <i class="fa-solid fa-cloud-arrow-up"></i>
                        <p id="upload-status-text">點擊或拖曳圖片至此處上傳</p>
                        <img id="upload-preview" class="preview-thumbnail" alt="預覽圖">
                    </div>
                    <a href="https://drive.google.com" class="cloud-link" target="_blank"><i class="fa-solid fa-images"></i> 點此開啟妳的雲端硬碟相簿</a>
                </div>

                <div class="form-group">
                    <label>選擇分類</label>
                    <select class="form-control" id="item-category">
                    </select>
                </div>

                <div class="form-group">
                    <label>小註解 | Personal Comments</label>
                    <textarea class="form-control" id="item-comment" placeholder="輸入妳的心得或註解..."></textarea>
                </div>

                <button type="submit" class="submit-btn" id="btn-submit-form">確認新增儲存</button>
                <button type="button" class="submit-btn" id="btn-cancel-edit" style="background-color: #888; display: none; margin-top: 8px;">取消編輯</button>
            </form>
        </div>

        <div class="right-section">
            <div class="filter-tags-row" id="filter-tags-container">
            </div>

            <div class="items-grid" id="items-grid-container">
            </div>
        </div>

    </div>

    <script>
        // === 1. 系統雲端與基礎組態設定 ===
        // ⚠️ 請在此處填入妳重新部署 lovelink 雙表分流版後取得的專屬 /exec 網址：
        const GAS_WEB_APP_URL = "https://script.google.com/macros/s/AKfycby8yUxhOon-_AmkLIRLXM_yyf_c_xiREWy9gPb_nrLUQ9pPEe-SPwQaAtMGp1ra4qAP/exec"; 
        
        let categories = [
            { id: "gourmet", name: "美食", icon: "fa-utensils" },
            { id: "hotel", name: "住宿", icon: "fa-bed" },
            { id: "novel", name: "小說", icon: "fa-book" },
            { id: "goods", name: "小物", icon: "fa-folder" },
            { id: "animal", name: "動物", icon: "fa-folder" }
        ];

        let collections = [];
        let currentFilter = "all";  
        let editTargetId = null;    
        let currentUploadedImgBase64 = ""; 
        let newlyUploadedIds = new Set(); // 💡 追蹤哪些卡片這回合有「重新上傳或新加照片」

        // === 2. 雲端資料初始化讀取模組 ===
        function initFromCloud() {
            if (!GAS_WEB_APP_URL || GAS_WEB_APP_URL.includes("YOUR_GAS_URL")) {
                console.log("未設定正確的 GAS 網址，使用本地測試預設資料。");
                renderSystem();
                return;
            }

            document.getElementById('items-grid-container').innerHTML = `<div style="grid-column: 1/-1; text-align: center; color: #666; padding: 40px; font-weight: 500;">⏳ 正在安全連線並同步雲端Lovlink試算表中...</div>`;

            fetch(GAS_WEB_APP_URL, { method: "GET", redirect: "follow" })
                .then(res => res.json())
                .then(cloudData => {
                    if (cloudData.categories && cloudData.categories.length > 0) {
                        categories = cloudData.categories;
                    }
                    if (cloudData.collections) {
                        collections = cloudData.collections;
                    }
                    console.log("雲端Lovlink資料載入成功：", cloudData);
                    renderSystem();
                })
                .catch(err => {
                    console.error("讀取失敗，使用預設資料控管：", err);
                    renderSystem();
                });
        }

        // === 3. 介面初始化渲染引擎 ===
        function renderSystem() {
            renderCategories();
            renderCategorySelect();
            renderFilterTags();
            renderCards();
        }

        function renderCategories() {
            const ul = document.getElementById('category-ul');
            const totalCount = collections.length;

            let html = `
                <li class="category-item ${currentFilter === 'all' ? 'active' : ''}" onclick="setFilter('all')">
                    <div class="category-info">
                        <i class="fa-solid fa-earth-asia"></i>
                        <span>全部項目</span>
                    </div>
                    <span class="category-count">${totalCount}</span>
                </li>
            `;

            categories.forEach(cat => {
                const count = collections.filter(item => item.category === cat.id).length;
                html += `
                    <li class="category-item ${currentFilter === cat.id ? 'active' : ''}" onclick="setFilter('${cat.id}')">
                        <div class="category-info">
                            <i class="fa-solid ${cat.icon}"></i>
                            <span>${cat.name}</span>
                        </div>
                        <div class="category-actions" onclick="event.stopPropagation();">
                            <i class="fa-solid fa-pen" title="重新命名" onclick="renameCategory('${cat.id}')"></i>
                            <i class="fa-solid fa-trash-can" title="刪除分類" onclick="deleteCategory('${cat.id}')"></i>
                        </div>
                        <span class="category-count">${count}</span>
                    </li>
                `;
            });
            ul.innerHTML = html;
        }

        function renderCategorySelect() {
            const select = document.getElementById('item-category');
            select.innerHTML = categories.map(cat => `<option value="${cat.id}">${cat.name}</option>`).join('');
        }

        function renderFilterTags() {
            const container = document.getElementById('filter-tags-container');
            let html = `<div class="filter-tag ${currentFilter === 'all' ? 'active' : ''}" onclick="setFilter('all')">全部</div>`;
            categories.forEach(cat => {
                html += `<div class="filter-tag ${currentFilter === cat.id ? 'active' : ''}" onclick="setFilter('${cat.id}')">${cat.name}</div>`;
            });
            container.innerHTML = html;
        }

        function renderCards() {
            const container = document.getElementById('items-grid-container');
            container.innerHTML = "";

            const filteredData = currentFilter === "all" 
                ? collections 
                : collections.filter(item => item.category === currentFilter);

            if (filteredData.length === 0) {
                container.innerHTML = `<div style="grid-column: 1/-1; text-align: center; color: #888; padding: 40px; font-weight: 500;">📂 該分類目前沒有任何項目，快從中間新增吧！</div>`;
                return;
            }

            filteredData.forEach(item => {
                const catObj = categories.find(c => c.id === item.category) || { name: "未分類", icon: "fa-folder" };
                const hasUrl = item.url && item.url.trim() !== "";
                const hasImg = item.img && item.img.trim() !== "";

                const cardHtml = `
                    <div class="item-card">
                        ${hasImg ? `<img src="${item.img}" class="card-img" alt="${item.name}">` : ''}
                        <div class="card-body">
                            <div class="card-title">${item.name}</div>
                            <div class="card-category"><i class="fa-solid ${catObj.icon}"></i> ${catObj.name}</div>
                            <div class="card-comment-box" ${!item.comment ? 'style="color: #888; font-style: italic;"' : ''}>
                                ${item.comment ? `<i class="fa-regular fa-comment-dots"></i> ${item.comment}` : '暫無備註說明'}
                            </div>
                        </div>
                        <div class="card-footer-actions">
                            <button class="card-action-btn link-btn" onclick="window.open('${item.url}', '_blank')" ${!hasUrl ? 'disabled style="opacity: 0.5;"' : ''}>
                                <i class="fa-solid ${hasUrl ? 'fa-link' : 'fa-link-slash'}"></i> ${hasUrl ? '開啟連結' : '無連結'}
                            </button>
                            <button class="card-action-btn edit-item-btn" onclick="startEdit('${item.id}')">
                                <i class="fa-solid fa-pen-to-square"></i> 編輯
                            </button>
                            <button class="card-action-btn delete-btn" onclick="deleteItem('${item.id}')">
                                <i class="fa-solid fa-trash-can"></i> 刪除
                            </button>
                        </div>
                    </div>
                `;
                container.insertAdjacentHTML('beforeend', cardHtml);
            });
        }

        function setFilter(catId) {
            currentFilter = catId;
            renderSystem();
        }

        // === 4. 圖片處理模組 ===
        const fileInput = document.getElementById('hidden-file-input');
        const statusText = document.getElementById('upload-status-text');
        const previewImg = document.getElementById('upload-preview');
        const dropZone = document.getElementById('drop-zone');

        if (dropZone) {
            dropZone.addEventListener('click', () => fileInput.click());
        }

        fileInput.addEventListener('change', function() {
            if (this.files && this.files[0]) {
                const file = this.files[0];
                statusText.innerText = "正在進行優化壓縮...";
                
                const reader = new FileReader();
                reader.onload = function(e) {
                    const img = new Image();
                    img.onload = function() {
                        const canvas = document.createElement('canvas');
                        const ctx = canvas.getContext('2d');
                        const maxW = 500;
                        let targetW = img.width;
                        let targetH = img.height;
                        
                        if (img.width > maxW) {
                            targetW = maxW;
                            targetH = Math.round((img.height * maxW) / img.width);
                        }
                        
                        canvas.width = targetW;
                        canvas.height = targetH;
                        ctx.drawImage(img, 0, 0, targetW, targetH);
                        
                        const compressedBase64 = canvas.toDataURL('image/jpeg', 0.7);
                        
                        previewImg.src = compressedBase64;
                        previewImg.style.display = 'block';
                        currentUploadedImgBase64 = compressedBase64; 
                        statusText.innerText = "⚡ 圖片已壓縮成功";
                        markUnsaved();
                    };
                    img.src = e.target.result;
                }
                reader.readAsDataURL(file);
            }
        });

        // === 5. 表單動作：新增與編輯邏輯 ===
        document.getElementById('item-form').addEventListener('submit', function(e) {
            e.preventDefault();

            const name = document.getElementById('item-name').value.trim();
            const url = document.getElementById('item-url').value.trim();
            const category = document.getElementById('item-category').value;
            const comment = document.getElementById('item-comment').value.trim();
            const targetId = editTargetId || ("item_" + Date.now());

            if (editTargetId === null) {
                const newItem = {
                    id: targetId, 
                    name: name,
                    url: url,
                    category: category,
                    comment: comment,
                    img: currentUploadedImgBase64 
                };
                collections.unshift(newItem); 
                if(currentUploadedImgBase64) newlyUploadedIds.add(targetId);
            } else {
                const index = collections.findIndex(item => item.id === editTargetId);
                if (index !== -1) {
                    collections[index].name = name;
                    collections[index].url = url;
                    collections[index].category = category;
                    collections[index].comment = comment;
                    // 如果有上傳新圖才覆蓋
                    if (currentUploadedImgBase64 !== collections[index].img) {
                        collections[index].img = currentUploadedImgBase64;
                        newlyUploadedIds.add(targetId);
                    }
                }
            }

            cancelEdit(); 
            renderSystem(); 
            markUnsaved();  
        });

        function startEdit(id) {
            const item = collections.find(i => i.id === id);
            if (!item) return;

            editTargetId = id;

            document.getElementById('form-panel-title').innerText = "編輯項目 ⚙️";
            document.getElementById('btn-submit-form').innerText = "確認修改儲存";
            document.getElementById('btn-cancel-edit').style.display = 'block';

            document.getElementById('item-name').value = item.name;
            document.getElementById('item-url').value = item.url;
            document.getElementById('item-category').value = item.category;
            document.getElementById('item-comment').value = item.comment;

            if (item.img) {
                previewImg.src = item.img;
                previewImg.style.display = 'block';
                currentUploadedImgBase64 = item.img;
                statusText.innerText = "已有圖片設定，可點擊更換";
            } else {
                previewImg.style.display = 'none';
                previewImg.src = '';
                currentUploadedImgBase64 = '';
                statusText.innerText = "點擊或拖曳圖片至此處上傳";
            }

            document.getElementById('item-form').scrollIntoView({ behavior: 'smooth' });
        }

        function cancelEdit() {
            editTargetId = null;
            document.getElementById('form-panel-title').innerText = "新增項目";
            document.getElementById('btn-submit-form').innerText = "確認新增儲存";
            document.getElementById('btn-cancel-edit').style.display = 'none';

            document.getElementById('item-form').reset();
            previewImg.style.display = 'none';
            previewImg.src = '';
            currentUploadedImgBase64 = '';
            statusText.innerText = "點擊或拖曳圖片至此處上傳";
        }
        
        document.getElementById('btn-cancel-edit').addEventListener('click', cancelEdit);

        function deleteItem(id) {
            if(confirm("確定要刪除這個收藏項目嗎？")) {
                collections = collections.filter(item => item.id !== id);
                newlyUploadedIds.delete(id);
                renderSystem();
                markUnsaved();
            }
        }

        // === 6. 分類功能 ===
        document.getElementById('btn-add-cat').addEventListener('click', function() {
            const input = document.getElementById('new-cat-input');
            const name = input.value.trim();
            if (!name) return;

            const newId = "cat_" + Date.now();
            categories.push({ id: newId, name: name, icon: "fa-folder" });
            input.value = "";
            renderSystem();
            markUnsaved();
        });

        function renameCategory(id) {
            const cat = categories.find(c => c.id === id);
            if (!cat) return;
            const newName = prompt("請輸入新的分類名稱：", cat.name);
            if (newName && newName.trim() !== "") {
                cat.name = newName.trim();
                renderSystem();
                markUnsaved();
            }
        }

        function deleteCategory(id) {
            if(confirm("確定刪除此分類？")) {
                categories = categories.filter(c => c.id !== id);
                collections.forEach(item => { if(item.category === id) item.category = ""; });
                if (currentFilter === id) currentFilter = "all";
                renderSystem();
                markUnsaved();
            }
        }

        // === 7. 雲端備份同步模組 (⚡ 終極輕量化傳輸) ===
        function markUnsaved() {
            document.getElementById('btn-global-save').classList.add('unsaved');
        }

        document.getElementById('btn-global-save').addEventListener('click', function() {
            const btn = this;
            const originalText = btn.innerHTML;
            btn.innerText = "⏳ 正在秒級同步中...";
            btn.disabled = true;

            // 💡 終極優化：只保留這次真正「新選取/新壓縮」的照片字串，其餘舊照片直接改傳空字串 ""！
            // 逼迫 GAS 不要重複去寫入、去動那幾百萬字的格子！
            const ultraLightCollections = collections.map(item => {
                var isNew = newlyUploadedIds.has(item.id);
                return {
                    id: item.id,
                    name: item.name,
                    url: item.url,
                    category: item.category,
                    comment: item.comment,
                    img: isNew ? item.img : "" 
                };
            });

            const payload = {
                categories: categories,
                collections: ultraLightCollections
            };
            
            fetch(GAS_WEB_APP_URL, {
                method: "POST",
                redirect: "follow",
                body: JSON.stringify(payload)
            })
            .then(res => res.text())
            .then(text => {
                btn.disabled = false;
                btn.classList.remove('unsaved');
                btn.innerHTML = originalText;
                if (text === "Success") {
                    newlyUploadedIds.clear(); // 儲存成功，重置新照片清單
                    alert('🎉 同步完畢！這次包裹體積極小，應該明顯感覺到速度提升了！');
                } else {
                    alert('同步時發生問題：' + text);
                }
            })
            .catch(err => {
                btn.disabled = false;
                btn.innerHTML = originalText;
                console.error(err);
                alert('連線失敗！');
            });
        });

        initFromCloud();
    </script>
</body>
</html>
