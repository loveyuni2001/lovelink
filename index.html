<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智慧連結收藏專案</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --bg-main: #f4eee1;          
            --bg-card: #ffffff;          
            --border-color: #000000;     
            --border-thick: 2px;
            --radius-main: 16px;
            --radius-card: 12px;
            --orange-accent: #ff826e;    
            --text-dark: #1a1a1a;
            --text-muted: #555555;
        }

        * {
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Microsoft JhengHei", sans-serif;
        }

        body {
            background-color: var(--bg-main);
            color: var(--text-dark);
            margin: 0;
            padding: 20px 0 70px 0; 
        }

        /* --- 歡迎橫幅 --- */
        .welcome-banner {
            background-color: #eae1cc;
            margin: 0 30px 20px 30px;
            padding: 15px 20px;
            border: var(--border-thick) solid var(--border-color);
            border-radius: var(--radius-card);
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 15px;
            font-weight: bold;
            box-shadow: 2px 2px 0px #000;
        }

        .welcome-banner i {
            font-size: 18px;
            color: #444;
        }

        /* --- 三欄式主版面 --- */
        .main-container {
            display: grid;
            grid-template-columns: 240px 320px 1fr;
            gap: 20px;
            padding: 0 30px;
            align-items: start;
        }

        .panel-box {
            background-color: var(--bg-card);
            border: var(--border-thick) solid var(--border-color);
            border-radius: var(--radius-main);
            padding: 20px;
            box-shadow: 3px 3px 0px rgba(0,0,0,0.05);
        }

        .panel-title {
            font-size: 16px;
            font-weight: bold;
            margin-top: 0;
            margin-bottom: 15px;
            border-bottom: 1px solid #eee;
            padding-bottom: 8px;
        }

        /* --- 左側欄：管理導航 --- */
        .nav-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .nav-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 11px 12px;
            border-radius: 8px;
            cursor: pointer;
            margin-bottom: 6px;
            font-size: 14px;
            font-weight: 500;
            transition: background 0.2s;
        }

        .nav-item:hover, .nav-item.active {
            background-color: #eae1cc;
            font-weight: bold;
        }

        .nav-item-left {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .nav-item-left i {
            width: 16px;
            text-align: center;
        }

        /* --- 中間欄：新增項目表單 --- */
        .form-group {
            margin-bottom: 14px;
        }

        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: bold;
            margin-bottom: 6px;
        }

        .form-control {
            width: 100%;
            border: var(--border-thick) solid var(--border-color);
            border-radius: 8px;
            padding: 9px 12px;
            font-size: 13px;
            background-color: #fafafa;
            outline: none;
        }
        .form-control:focus { background-color: #fff; }

        /* 雲端硬碟提示連結 */
        .drive-link-box {
            margin-top: 5px;
            font-size: 11px;
        }
        .drive-link-box a {
            color: #0066cc;
            text-decoration: none;
            font-weight: bold;
        }
        .drive-link-box a:hover { text-decoration: underline; }

        .btn-submit-block {
            width: 100%;
            background-color: #000000;
            color: white;
            border: var(--border-thick) solid var(--border-color);
            border-radius: 25px;
            padding: 12px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 15px;
            text-align: center;
            box-shadow: 2px 2px 0px var(--orange-accent);
        }
        .btn-submit-block:hover { background: #222; }

        /* --- 右側欄：展示牆區 --- */
        .gallery-header {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
            overflow-x: auto;
            padding-bottom: 5px;
        }

        .tag-tab {
            background-color: white;
            border: var(--border-thick) solid var(--border-color);
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: bold;
            cursor: pointer;
        }

        .tag-tab.active {
            background-color: #000000;
            color: white;
        }

        .cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 15px;
        }

        /* 卡片設計 */
        .link-card {
            background-color: #fdf5e6; 
            border: var(--border-thick) solid var(--border-color);
            border-radius: var(--radius-card);
            box-shadow: 4px 4px 0px var(--orange-accent); 
            display: flex;
            flex-direction: column;
            overflow: hidden;
            transition: transform 0.2s;
        }
        .link-card:hover {
            transform: translate(-2px, -2px);
            box-shadow: 6px 6px 0px var(--orange-accent);
        }

        .card-cover {
            width: 100%;
            height: 110px;
            object-fit: cover;
            border-bottom: var(--border-thick) solid var(--border-color);
        }

        .card-body {
            padding: 12px;
            display: flex;
            flex-direction: column;
            flex-grow: 1;
        }

        .card-main-title {
            font-size: 15px;
            font-weight: bold;
            margin: 0 0 6px 0;
        }

        .card-loc-tag {
            font-size: 11px;
            color: #666;
            display: flex;
            align-items: center;
            gap: 4px;
            margin-bottom: 10px;
        }

        .card-comment-box {
            font-size: 12px;
            background: white;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 8px 10px;
            margin-bottom: 12px;
            line-height: 1.4;
            color: #333;
            display: flex;
            gap: 6px;
        }

        .card-actions-bar {
            margin-top: auto;
            border-top: 1px solid #ddd;
            padding-top: 10px;
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            text-align: center;
            gap: 2px;
        }

        .card-act-btn {
            background: none;
            border: none;
            font-size: 11px;
            font-weight: bold;
            color: var(--text-dark);
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            text-decoration: none;
        }
        .card-act-btn i { font-size: 14px; }
        .card-act-btn:hover { color: var(--orange-accent); }

        /* --- 重新分類專用燈箱 (Modal) 樣式 --- */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.5);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .modal-box {
            background: white;
            border: var(--border-thick) solid #000;
            border-radius: var(--radius-card);
            padding: 20px;
            width: 300px;
            box-shadow: 4px 4px 0px #000;
        }
        .modal-title { font-weight: bold; margin-bottom: 15px; font-size: 15px; }
        .modal-buttons { display: flex; justify-content: flex-end; gap: 10px; margin-top: 15px; }
        .modal-btn {
            border: var(--border-thick) solid #000;
            padding: 6px 14px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: bold;
            cursor: pointer;
        }
        .modal-btn-confirm { background: #000; color: #fff; }

        /* 底部導航視覺線 */
        .bottom-bar {
            position: fixed;
            bottom: 0; left: 0; right: 0; height: 55px;
            background-color: #ffffff;
            border-top: var(--border-thick) solid var(--border-color);
            display: flex;
            justify-content: space-around;
            align-items: center;
            z-index: 100;
        }
        .bottom-nav-item { display: flex; flex-direction: column; align-items: center; font-size: 11px; color: #666; }
        .bottom-nav-item i { font-size: 18px; margin-bottom: 2px; }
        .bottom-nav-item.active { color: #000; font-weight: bold; }

        @media (max-width: 900px) {
            .main-container { grid-template-columns: 1fr; }
            .welcome-banner, .main-container { padding: 10px; margin: 10px; }
        }
    </style>
</head>
<body>

    <!-- 頂部僅保留收藏家歡迎列 -->
    <div class="welcome-banner">
        <i class="fa-solid fa-circle-user"></i>
        <span>歡迎回來，親愛的收藏家 | 妳的智慧連結收藏專案</span>
    </div>

    <!-- 主版面 -->
    <div class="main-container">

        <!-- 1. 左側欄 -->
        <div class="panel-box">
            <h2 class="panel-title">管理導航</h2>
            <ul class="nav-list" id="category-list"></ul>
        </div>

        <!-- 2. 中間欄 -->
        <div class="panel-box">
            <h2 class="panel-title">新增項目</h2>
            
            <div class="form-group">
                <label>名稱 (連結或小說標題)</label>
                <input type="text" id="item-name" class="form-control" placeholder="請輸入名稱">
            </div>
            
            <div class="form-group">
                <label>連結網址 (選填，無則留白)</label>
                <input type="url" id="item-url" class="form-control" placeholder="https://...">
            </div>

            <div class="form-group">
                <label>上傳/選擇照片封面 (選填貼上網址)</label>
                <input type="url" id="item-img" class="form-control" placeholder="請貼上圖片網址">
                <div class="drive-link-box">
                    <i class="fa-brands fa-google-drive" style="color: #1f8b4d;"></i> 
                    <a href="https://drive.google.com/drive/folders/1EesduTG9JQjmlm0e3JGZVQcGm_7yj7Ut" target="_blank">點此開啟妳的雲端硬碟相簿</a>
                </div>
            </div>
            
            <div class="form-group">
                <label>選擇分類</label>
                <select id="item-category" class="form-control" onchange="handleCategorySelect(this)">
                    <!-- 動態載入，最後一項會是自訂分類 -->
                </select>
            </div>

            <!-- 當選取自訂項目時才會跳出來的隱藏輸入框 -->
            <div class="form-group" id="custom-cat-group" style="display: none;">
                <label style="color: var(--orange-accent);">請輸入新分類名稱</label>
                <input type="text" id="custom-category-name" class="form-control" placeholder="例如：購物、私藏">
            </div>
            
            <div class="form-group">
                <label>小註解 | Personal Comments</label>
                <textarea id="item-notes" class="form-control" rows="4" placeholder="輸入妳的心得或註解..."></textarea>
            </div>
            
            <button class="btn-submit-block" onclick="createNewItem()">
                確認新增儲存
            </button>
        </div>

        <!-- 3. 右側欄 -->
        <div>
            <div class="gallery-header" id="filter-tabs"></div>
            <div class="cards-grid" id="cards-container"></div>
        </div>

    </div>

    <!-- 重新分類使用的下拉式選單燈箱 (Modal) -->
    <div class="modal-overlay" id="reclass-modal">
        <div class="modal-box">
            <div class="modal-title"><i class="fa-solid fa-gear"></i> 變更項目分類</div>
            <div class="form-group">
                <label>選擇新分類</label>
                <select id="modal-select" class="form-control"></select>
            </div>
            <div class="modal-buttons">
                <button class="modal-btn" onclick="closeModal()">取消</button>
                <button class="modal-btn modal-btn-confirm" onclick="confirmReclassify()">確認更改</button>
            </div>
        </div>
    </div>

    <!-- 底部視覺列 -->
    <div class="bottom-bar">
        <div class="bottom-nav-item active"><i class="fa-solid fa-house"></i>首頁</div>
        <div class="bottom-nav-item"><i class="fa-solid fa-user-group"></i>朋友</div>
        <div class="bottom-nav-item"><i class="fa-solid fa-calendar-days"></i>計畫</div>
        <div class="bottom-nav-item"><i class="fa-solid fa-circle-user"></i>我</div>
    </div>

    <script>
        // 初始化核心數據
        const defaultCategories = ['全部項目', '美食拉', '住宿', '小說/註解', '自訂項目'];
        let categories = JSON.parse(localStorage.getItem('nav_categories')) || defaultCategories;
        
        const defaultItems = [
            { id: 1, name: 'Mat Up 覓晌', url: 'https://maps.google.com', img: 'https://images.unsplash.com/photo-1554118811-1e0d58224f24?w=500', category: '美食拉', notes: '探索中山的美食！超推～' },
            { id: 2, name: 'Meat Up', url: 'https://maps.google.com', img: 'https://images.unsplash.com/photo-1517248135467-4c7edcad34c4?w=500', category: '住宿', notes: '捷運站附近的精緻環境。' },
            { id: 3, name: '赤丸椰子', url: '', img: 'https://images.unsplash.com/photo-1559925393-8be0ec4767c8?w=500', category: '美食拉', notes: '台北中山赤丸椰子，味道濃郁！' },
            { id: 4, name: '風中遺珠', url: '', img: '', category: '小說/註解', notes: '【小說標題：風中遺珠】推薦理由：情節轉折很精彩，值得一讀。' }
        ];
        let items = JSON.parse(localStorage.getItem('nav_links_items')) || defaultItems;
        let activeFilter = '全部項目';
        let currentTargetItemId = null; // 用於紀錄哪張卡片正在被重新分類

        // 監聽中間下拉選單，若選到自訂項目則打開輸入框
        function handleCategorySelect(selectObj) {
            const customGroup = document.getElementById('custom-cat-group');
            if (selectObj.value === '自訂項目') {
                customGroup.style.display = 'block';
            } else {
                customGroup.style.display = 'none';
            }
        }

        // 建立新項目
        function createNewItem() {
            const name = document.getElementById('item-name').value.trim();
            const url = document.getElementById('item-url').value.trim();
            const img = document.getElementById('item-img').value.trim();
            let category = document.getElementById('item-category').value;
            const notes = document.getElementById('item-notes').value.trim();

            if (!name) {
                alert('請輸入名稱（連結或小說標題）喔！');
                return;
            }

            // 如果使用者選擇自訂項目，則動態把新類別加進去
            if (category === '自訂項目') {
                const customName = document.getElementById('custom-category-name').value.trim();
                if (!customName) {
                    alert('請輸入妳想要的自訂分類名稱！');
                    return;
                }
                if (!categories.includes(customName)) {
                    // 把新分類安插在“自訂項目”的前面
                    categories.splice(categories.length - 1, 0, customName);
                }
                category = customName;
            }

            const item = { id: Date.now(), name, url, img, category, notes };
            items.unshift(item);
            saveToStorage();
            resetForm();
            renderAll();
        }

        // 刪除項目
        function deleteCard(id) {
            if (confirm('確定要刪除這個項目嗎？')) {
                items = items.filter(i => i.id !== id);
                saveToStorage();
                renderAll();
            }
        }

        // 打開重新分類下拉選單燈箱
        function openReclassifyModal(id) {
            const item = items.find(i => i.id === id);
            if (!item) return;
            currentTargetItemId = id;

            const modalSelect = document.getElementById('modal-select');
            // 只列出真實可選的分類（濾除全部項目與自訂項目）
            const availableOptions = categories.filter(c => c !== '全部項目' && c !== '自訂項目');
            
            modalSelect.innerHTML = availableOptions.map(cat => 
                `<option value="${cat}" ${item.category === cat ? 'selected' : ''}>${cat}</option>`
            ).join('');

            document.getElementById('reclass-modal').style.display = 'flex';
        }

        function closeModal() {
            document.getElementById('reclass-modal').style.display = 'none';
            currentTargetItemId = null;
        }

        // 確認變更分類
        function confirmReclassify() {
            const selectedCat = document.getElementById('modal-select').value;
            if (currentTargetItemId && selectedCat) {
                const item = items.find(i => i.id === currentTargetItemId);
                if (item) {
                    item.category = selectedCat;
                    saveToStorage();
                    renderAll();
                }
            }
            closeModal();
        }

        function saveToStorage() {
            localStorage.setItem('nav_categories', JSON.stringify(categories));
            localStorage.setItem('nav_links_items', JSON.stringify(items));
        }

        function resetForm() {
            document.getElementById('item-name').value = '';
            document.getElementById('item-url').value = '';
            document.getElementById('item-img').value = '';
            document.getElementById('item-notes').value = '';
            document.getElementById('item-category').value = categories[1]; // 預設回到第一個實際分類
            document.getElementById('custom-category-name').value = '';
            document.getElementById('custom-cat-group').style.display = 'none';
        }

        function changeFilter(catName) {
            activeFilter = catName;
            renderAll();
        }

        // 全網頁渲染引擎
        function renderAll() {
            // A. 左側選單
            const catListContainer = document.getElementById('category-list');
            catListContainer.innerHTML = categories.filter(c => c !== '自訂項目').map(cat => {
                const count = cat === '全部項目' ? items.length : items.filter(i => i.category === cat).length;
                const icon = cat === '美食拉' ? 'fa-utensils' : (cat === '住宿' ? 'fa-bed' : (cat === '小說/註解' ? 'fa-book-open' : 'fa-folder'));
                return `
                    <li class="nav-item ${activeFilter === cat ? 'active' : ''}" onclick="changeFilter('${cat}')">
                        <div class="nav-item-left">
                            <i class="fa-solid ${cat === '全部項目' ? 'fa-globe' : icon}"></i>
                            <span>${cat}</span>
                        </div>
                        <span style="font-size:12px; font-weight:bold;">(${count})</span>
                    </li>
                `;
            }).join('');

            // B. 中間表單下拉選單（保留自訂項目在最後一項，讓使用者可以點擊新增）
            const selectContainer = document.getElementById('item-category');
            const formOptions = categories.filter(cat => cat !== '全部項目');
            selectContainer.innerHTML = formOptions.map(cat => 
                `<option value="${cat}">${cat}</option>`
            ).join('');

            // C. 右側頂部快速分類標籤
            const filterTabsContainer = document.getElementById('filter-tabs');
            const displayTabs = ['全部項目', '美食拉', '住宿', '小說/註解'];
            filterTabsContainer.innerHTML = displayTabs.map(tab => `
                <button class="tag-tab ${activeFilter === tab ? 'active' : ''}" onclick="changeFilter('${tab}')">
                    ${tab === '全部項目' ? '全部' : (tab === '美食拉' ? '吃喝' : (tab === '住宿' ? '戶外' : '探索'))}
                </button>
            `).join('');

            // D. 右側項目卡片牆
            const cardsContainer = document.getElementById('cards-container');
            const filteredItems = activeFilter === '全部項目' ? items : items.filter(i => i.category === activeFilter);

            if (filteredItems.length === 0) {
                cardsContainer.innerHTML = `<div style="grid-column: 1/-1; text-align: center; color: #777; padding: 40px; font-size: 14px;">此分類目前空空的，快從中間新增吧！</div>`;
                return;
            }

            cardsContainer.innerHTML = filteredItems.map(i => {
                const imageTag = i.img ? `<img src="${i.img}" class="card-cover" alt="cover">` : '';
                const pinIcon = i.category === '美食拉' ? 'fa-location-dot' : 'fa-hotel';
                
                return `
                    <div class="link-card">
                        ${imageTag}
                        <div class="card-body">
                            <h3 class="card-main-title">${i.name}</h3>
                            <div class="card-loc-tag">
                                <i class="fa-solid ${pinIcon}"></i> ${i.category}
                            </div>
                            
                            ${i.notes ? `
                            <div class="card-comment-box">
                                <i class="fa-regular fa-comment-dots"></i>
                                <div>${i.notes}</div>
                            </div>
                            ` : ''}

                            <div class="card-actions-bar">
                                ${i.url ? `
                                <a href="${i.url}" target="_blank" class="card-act-btn">
                                    <i class="fa-solid fa-arrow-up-right-from-square"></i>
                                    <span>開啟連結</span>
                                </a>
                                ` : `
                                <div class="card-act-btn" style="opacity: 0.3; cursor: not-allowed;">
                                    <i class="fa-solid fa-link-slash"></i>
                                    <span>無連結</span>
                                </div>
                                `}
                                <button class="card-act-btn" onclick="openReclassifyModal(${i.id})">
                                    <i class="fa-solid fa-gear"></i>
                                    <span>重新分類</span>
                                </button>
                                <button class="card-act-btn" onclick="deleteCard(${i.id})">
                                    <i class="fa-solid fa-trash-can"></i>
                                    <span>刪除項目</span>
                                </button>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        renderAll();
    </script>
</body>
</html>
