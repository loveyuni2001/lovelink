<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>收藏管理系統 - 穩定修復版</title>
    <!-- 引入 Font Awesome 圖示 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg-color: #f7f2ea;
            --card-bg: #fffbf5;
            --text-color: #1a1a1a;
            --border-color: #000000;
            --primary-accent: #ff7657;
            --secondary-accent: #ffd275;
            --success-color: #4caf50;
            --shadow-style: 4px 4px 0px #000000;
            --font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Noto Sans TC", sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-color);
            font-family: var(--font-family);
            color: var(--text-color);
            padding: 20px;
            line-height: 1.4;
        }

        /* 頂部全局功能列 */
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            padding: 10px;
            background-color: white;
            border: 2px solid var(--border-color);
            border-radius: 12px;
            box-shadow: 3px 3px 0px #000;
        }

        .system-title {
            font-size: 20px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .global-save-btn {
            background-color: var(--success-color);
            color: white;
            border: 2px solid var(--border-color);
            padding: 10px 20px;
            font-size: 15px;
            font-weight: 700;
            border-radius: 8px;
            cursor: pointer;
            box-shadow: 2px 2px 0px #000;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .global-save-btn:active {
            transform: translate(1px, 1px);
            box-shadow: 1px 1px 0px #000;
        }
        .global-save-btn.unsaved {
            background-color: var(--primary-accent);
        }

        /* 核心佈局：改用傳統超穩定不破版 Flex 佈局 */
        .wrapper {
            display: flex;
            width: 100%;
            gap: 20px;
            align-items: flex-start;
        }

        /* 左側欄：固定 280px */
        .left-col {
            width: 280px;
            flex-shrink: 0;
        }

        /* 中間欄：固定 400px */
        .mid-col {
            width: 400px;
            flex-shrink: 0;
        }

        /* 右側欄：剩餘空間全部給它，並設定防爆開 */
        .right-col {
            flex-grow: 1;
            min-width: 0; 
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        /* 通用區塊卡片外觀 */
        .panel-box {
            background-color: var(--card-bg);
            border: 2px solid var(--border-color);
            border-radius: 16px;
            padding: 20px;
            box-shadow: var(--shadow-style);
            margin-bottom: 20px;
        }

        .panel-title {
            font-size: 16px;
            font-weight: 700;
            margin-bottom: 16px;
            padding-bottom: 8px;
            border-bottom: 2px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        /* 管理導覽清單（徹底修復錯位與點點問題） */
        .category-list {
            list-style: none; /* 拔掉預設醜黑點 */
            padding: 0;
            margin: 0;
        }

        .category-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 12px;
            border-radius: 8px;
            border: 2px solid transparent;
            cursor: pointer;
            font-weight: 500;
            margin-bottom: 6px;
            background-color: white;
            box-shadow: 2px 2px 0px rgba(0,0,0,0.05);
        }

        .category-item.active {
            background-color: var(--secondary-accent);
            border-color: var(--border-color);
            box-shadow: 2px 2px 0px #000;
        }

        .category-left-part {
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 700;
        }

        .category-right-part {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .category-count {
            background-color: var(--border-color);
            color: white;
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 700;
        }

        .category-actions-tools {
            display: flex;
            gap: 4px;
        }
        .category-actions-tools i {
            color: #666;
            padding: 4px;
            border-radius: 4px;
        }
        .category-actions-tools i:hover {
            color: var(--primary-accent);
            background-color: #eee;
        }

        .add-category-inline {
            margin-top: 12px;
            display: flex;
            gap: 6px;
        }
        .add-category-inline input {
            flex: 1;
            padding: 8px;
            border: 2px solid var(--border-color);
            border-radius: 6px;
        }
        .add-category-inline button {
            background-color: var(--secondary-accent);
            border: 2px solid var(--border-color);
            border-radius: 6px;
            padding: 0 12px;
            cursor: pointer;
            font-weight: 700;
        }

        /* 表單區 */
        .form-group {
            margin-bottom: 12px;
        }
        .form-group label {
            display: block;
            font-weight: 700;
            font-size: 13px;
            margin-bottom: 6px;
        }
        .form-control {
            width: 100%;
            padding: 10px;
            border: 2px solid var(--border-color);
            border-radius: 8px;
            font-size: 14px;
            background-color: white;
        }

        .upload-zone {
            border: 2px dashed var(--border-color);
            border-radius: 8px;
            padding: 12px;
            text-align: center;
            background-color: white;
            cursor: pointer;
        }
        .upload-preview {
            width: 100%;
            max-height: 100px;
            object-fit: cover;
            margin-top: 8px;
            display: none;
            border: 1px solid #000;
            border-radius: 4px;
        }
        .cloud-link {
            display: inline-block;
            margin-top: 6px;
            font-size: 12px;
            color: #0066cc;
            text-decoration: none;
        }

        .submit-btn {
            width: 100%;
            background-color: var(--border-color);
            color: white;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            margin-top: 6px;
        }

        /* 右側篩選標籤 */
        .filter-tags-row {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
            background-color: white;
            padding: 10px;
            border: 2px solid var(--border-color);
            border-radius: 12px;
        }
        .filter-tag {
            background-color: #fff;
            border: 2px solid var(--border-color);
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 13px;
            font-weight: 700;
            cursor: pointer;
        }
        .filter-tag.active {
            background-color: var(--border-color);
            color: white;
        }

        /* 右側卡片網格（修正並採用 Flex 多行排列，確保絕不破版掉下去） */
        .items-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 16px;
            width: 100%;
        }

        .item-card {
            background-color: var(--card-bg);
            border: 2px solid var(--border-color);
            border-radius: 12px;
            width: calc(50% - 8px); /* 平分右邊空間，一行出兩張卡片 */
            min-width: 250px;
            box-shadow: 3px 3px 0px #000;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .card-img {
            width: 100%;
            height: 140px;
            object-fit: cover;
            border-bottom: 2px solid var(--border-color);
        }

        .card-body {
            padding: 12px;
            flex-grow: 1;
        }
        .card-title {
            font-size: 15px;
            font-weight: 700;
            margin-bottom: 4px;
        }
        .card-category {
            font-size: 12px;
            color: #666;
            font-weight: bold;
            margin-bottom: 6px;
        }
        .card-comment-box {
            background-color: white;
            border: 2px solid var(--border-color);
            border-radius: 6px;
            padding: 8px;
            font-size: 13px;
            white-space: pre-wrap;
        }

        .card-footer-actions {
            display: flex;
            border-top: 2px solid var(--border-color);
            background-color: white;
        }
        .card-action-btn {
            flex: 1;
            border: none;
            background: none;
            padding: 10px 4px;
            font-size: 12px;
            font-weight: 700;
            cursor: pointer;
            text-align: center;
            text-decoration: none;
            color: #1a1a1a;
        }
        .card-action-btn:not(:last-child) {
            border-right: 2px solid var(--border-color);
        }
        .card-action-btn:hover {
            background-color: #f5f5f5;
        }
        .card-action-btn.delete-btn:hover {
            background-color: #fff0f0;
            color: red;
        }

        #hidden-file-input {
            display: none;
        }
    </style>
</head>
<body>

    <!-- 頂部列 -->
    <div class="top-bar">
        <div class="system-title">
            <i class="fa-solid fa-box-archive"></i> 收藏與註解管理後台
        </div>
        <button class="global-save-btn" id="btn-global-save">
            <i class="fa-solid fa-cloud-arrow-up"></i> 一鍵儲存並同步至雲端
        </button>
    </div>

    <!-- 三欄主要大包裝 -->
    <div class="wrapper">
        
        <!-- 左側：導覽區 -->
        <div class="left-col">
            <div class="panel-box">
                <div class="panel-title">管理導覽</div>
                <ul class="category-list" id="category-ul">
                    <!-- JS 動態生成 -->
                </ul>
                <div class="add-category-inline">
                    <input type="text" id="new-cat-input" placeholder="加新分類...">
                    <button onclick="addNewCategory()"><i class="fa-solid fa-plus"></i></button>
                </div>
            </div>
        </div>

        <!-- 中間：表單區 -->
        <div class="mid-col">
            <div class="panel-box">
                <div class="panel-title" id="form-panel-title">新增項目</div>
                <form id="item-form" onsubmit="saveItem(event)">
                    <div class="form-group">
                        <label>名稱 (小說標題/地點)</label>
                        <input type="text" class="form-control" id="item-name" required placeholder="請輸入名稱">
                    </div>
                    <div class="form-group">
                        <label>連結網址 (可留白)</label>
                        <input type="url" class="form-control" id="item-url" placeholder="https://...">
                    </div>
                    <div class="form-group">
                        <label>照片封面 (可留白)</label>
                        <input type="file" id="hidden-file-input" accept="image/*" onchange="previewFile()">
                        <div class="upload-zone" onclick="document.getElementById('hidden-file-input').click()">
                            <i class="fa-solid fa-image" style="font-size:20px; color:#666;"></i>
                            <p id="upload-status-text" style="font-size:12px;">點擊選取圖片檔案</p>
                            <img id="upload-preview" class="upload-preview">
                        </div>
                        <a href="https://drive.google.com/drive/folders/1EesduTG9JQjmlm0e3JGZVQcGm_7yj7Ut" class="cloud-link" target="_blank"><i class="fa-solid fa-images"></i> 開啟雲端硬碟相簿</a>
                    </div>
                    <div class="form-group">
                        <label>選擇分類</label>
                        <select class="form-control" id="item-category"></select>
                    </div>
                    <div class="form-group">
                        <label>小註解 | Comments</label>
                        <textarea class="form-control" id="item-comment" rows="4" placeholder="寫下妳的筆記..."></textarea>
                    </div>
                    <button type="submit" class="submit-btn" id="btn-submit-form">確認新增儲存</button>
                    <button type="button" class="submit-btn" id="btn-cancel-edit" style="background-color:#888; display:none;" onclick="cancelEdit()">取消編輯</button>
                </form>
            </div>
        </div>

        <!-- 右側：卡片牆總覽 -->
        <div class="right-col">
            <div class="filter-tags-row" id="filter-tags-container"></div>
            <div class="items-grid" id="items-grid-container"></div>
        </div>

    </div>

    <!-- 控制心臟 -->
    <script>
        let categories = JSON.parse(localStorage.getItem('lovelink_categories')) || ['美食拉', '住宿', '小說/註解', '老公的'];
        let collections = JSON.parse(localStorage.getItem('lovelink_items')) || [
            { id: 1, name: '測試用的範例卡片', url: '', img: '', category: '小說/註解', comment: '點擊右下角的「編輯修改」按鈕，可以把這張卡片的內容抓回中間欄位修改喔！' }
        ];
        
        let currentFilter = '全部';
        let editTargetId = null;
        let currentUploadedImgBase64 = '';

        function init() {
            renderCategories();
            renderFilterTags();
            renderCards();
        }

        function renderCategories() {
            const container = document.getElementById('category-ul');
            const allActive = currentFilter === '全部' ? 'active' : '';
            
            let html = `
                <li class="category-item ${allActive}" onclick="setFilter('全部')">
                    <div class="category-left-part">
                        <i class="fa-solid fa-earth-asia"></i>
                        <span>全部項目</span>
                    </div>
                    <div class="category-right-part">
                        <span class="category-count">${collections.length}</span>
                    </div>
                </li>
            `;

            categories.forEach(cat => {
                const count = collections.filter(item => item.category === cat).length;
                const isActive = currentFilter === cat ? 'active' : '';
                const icon = cat === '美食拉' ? 'fa-utensils' : (cat === '住宿' ? 'fa-bed' : (cat === '小說/註解' ? 'fa-book' : 'fa-folder'));
                
                html += `
                    <li class="category-item ${isActive}" onclick="setFilter('${cat}')">
                        <div class="category-left-part">
                            <i class="fa-solid ${icon}"></i>
                            <span>${cat}</span>
                        </div>
                        <div class="category-right-part">
                            <div class="category-actions-tools">
                                <i class="fa-solid fa-pen" onclick="event.stopPropagation(); renameCategory('${cat}')"></i>
                                <i class="fa-solid fa-trash-can" onclick="event.stopPropagation(); deleteCategory('${cat}')"></i>
                            </div>
                            <span class="category-count">${count}</span>
                        </div>
                    </li>
                `;
            });
            container.innerHTML = html;

            const select = document.getElementById('item-category');
            select.innerHTML = categories.map(cat => `<option value="${cat}">${cat}</option>`).join('');
        }

        function renderFilterTags() {
            const container = document.getElementById('filter-tags-container');
            const tags = ['全部', ...categories];
            container.innerHTML = tags.map(tag => {
                const isActive = currentFilter === tag ? 'active' : '';
                return `<div class="filter-tag ${isActive}" onclick="setFilter('${tag}')">${tag}</div>`;
            }).join('');
        }

        function setFilter(cat) {
            currentFilter = cat;
            renderCategories();
            renderFilterTags();
            renderCards();
        }

        function addNewCategory() {
            const input = document.getElementById('new-cat-input');
            const name = input.value.trim();
            if (!name) return;
            if (categories.includes(name)) { alert('名稱重複囉！'); return; }
            categories.push(name);
            input.value = '';
            markUnsaved();
            renderCategories();
            renderFilterTags();
        }

        function renameCategory(oldName) {
            const newName = prompt(`請輸入「${oldName}」的新名稱：`, oldName);
            if (!newName || newName.trim() === '' || newName === oldName) return;
            const trimmed = newName.trim();
            categories = categories.map(c => c === oldName ? trimmed : c);
            collections.forEach(item => { if (item.category === oldName) item.category = trimmed; });
            if (currentFilter === oldName) currentFilter = trimmed;
            markUnsaved();
            renderCategories();
            renderFilterTags();
            renderCards();
        }

        function deleteCategory(catName) {
            if (!confirm(`確定要刪除「${catName}」分類嗎？底下的項目也會一起被刪除喔！`)) return;
            categories = categories.filter(c => c !== catName);
            collections = collections.filter(item => item.category !== catName);
            if (currentFilter === catName) currentFilter = '全部';
            markUnsaved();
            renderCategories();
            renderFilterTags();
            renderCards();
        }

        function previewFile() {
            const file = document.getElementById('hidden-file-input').files[0];
            const statusText = document.getElementById('upload-status-text');
            const previewImg = document.getElementById('upload-preview');
            if (file) {
                statusText.innerText = `已選：${file.name}`;
                const reader = new FileReader();
                reader.onload = function(e) {
                    previewImg.src = e.target.result;
                    previewImg.style.display = 'block';
                    currentUploadedImgBase64 = e.target.result;
                }
                reader.readAsDataURL(file);
                markUnsaved();
            }
        }

        function saveItem(event) {
            event.preventDefault();
            const name = document.getElementById('item-name').value.trim();
            const url = document.getElementById('item-url').value.trim();
            const category = document.getElementById('item-category').value;
            const comment = document.getElementById('item-comment').value.trim();

            if (editTargetId === null) {
                collections.unshift({
                    id: Date.now(),
                    name: name,
                    url: url,
                    img: currentUploadedImgBase64,
                    category: category,
                    comment: comment || '暫無備註說明'
                });
            } else {
                const target = collections.find(item => item.id === editTargetId);
                if (target) {
                    target.name = name;
                    target.url = url;
                    target.category = category;
                    target.comment = comment || '暫無備註說明';
                    if (currentUploadedImgBase64) target.img = currentUploadedImgBase64;
                }
            }
            cancelEdit();
            markUnsaved();
            renderCategories();
            renderCards();
        }

        function startEdit(id) {
            const item = collections.find(i => i.id === id);
            if (!item) return;
            editTargetId = id;
            document.getElementById('form-panel-title').innerText = "編輯項目 ⚙️";
            document.getElementById('item-name').value = item.name;
            document.getElementById('item-url').value = item.url;
            document.getElementById('item-category').value = item.category;
            document.getElementById('item-comment').value = item.comment === '暫無備註說明' ? '' : item.comment;
            
            const previewImg = document.getElementById('upload-preview');
            if (item.img) {
                previewImg.src = item.img;
                previewImg.style.display = 'block';
            } else {
                previewImg.style.display = 'none';
            }
            document.getElementById('btn-submit-form').innerText = "確認修改儲存";
            document.getElementById('btn-cancel-edit').style.style.display = 'block';
        }

        function cancelEdit() {
            editTargetId = null;
            document.getElementById('item-form').reset();
            document.getElementById('form-panel-title').innerText = "新增項目";
            document.getElementById('upload-preview').style.display = 'none';
            document.getElementById('upload-status-text').innerText = "點擊選取圖片檔案";
            document.getElementById('btn-submit-form').innerText = "確認新增儲存";
            document.getElementById('btn-cancel-edit').style.display = 'none';
            currentUploadedImgBase64 = '';
        }

        function deleteCard(id) {
            if (!confirm('確定要刪除嗎？')) return;
            collections = collections.filter(item => item.id !== id);
            if(editTargetId === id) cancelEdit();
            markUnsaved();
            renderCategories();
            renderCards();
        }

        function renderCards() {
            const container = document.getElementById('items-grid-container');
            const data = currentFilter === '全部' ? collections : collections.filter(i => i.category === currentFilter);

            if (data.length === 0) {
                container.innerHTML = `<div style="width:100%; text-align:center; padding:40px; color:#666;">目前沒有項目，快從中間表單新增吧！</div>`;
                return;
            }

            container.innerHTML = data.map(item => {
                const img = item.img ? `<img src="${item.img}" class="card-img">` : '';
                const linkBtn = item.url ? `<a href="${item.url}" target="_blank" class="card-action-btn"><i class="fa-solid fa-link"></i> 連結</a>` : `<span class="card-action-btn" style="opacity:0.3;"><i class="fa-solid fa-link-slash"></i> 無</span>`;
                return `
                    <div class="item-card">
                        ${img}
                        <div class="card-body">
                            <div class="card-title">${item.name}</div>
                            <div class="card-category">${item.category}</div>
                            <div class="card-comment-box">${item.comment}</div>
                        </div>
                        <div class="card-footer-actions">
                            ${linkBtn}
                            <button class="card-action-btn" onclick="startEdit(${item.id})">修改</button>
                            <button class="card-action-btn delete-btn" onclick="deleteCard(${item.id})">刪除</button>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function markUnsaved() {
            document.getElementById('btn-global-save').classList.add('unsaved');
        }

        document.getElementById('btn-global-save').addEventListener('click', function() {
            localStorage.setItem('lovelink_categories', JSON.stringify(categories));
            localStorage.setItem('lovelink_items', JSON.stringify(collections));
            this.classList.remove('unsaved');
            alert('🎉 完美修復排版！最新的所有分類、註解資料已經穩穩儲存囉！');
        });

        init();
    </script>
</body>
</html>
