<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>收藏管理系統 - 專業版</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&family=Product+Sans:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg-color: #f7f2ea;
            --card-bg: #fffbf5;
            --text-color: #1a1a1a;
            --border-color: #000000;
            --primary-accent: #ff7657;
            --secondary-accent: #ffd275;
            --success-color: #4caf50;
            --shadow-style: 4px 4px 0px #000000;
            --font-family: 'Product Sans', 'Noto Sans TC', sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-color);
            font-family: var(--font-family);
            color: var(--text-color);
            padding: 24px;
            line-height: 1.25;
        }

        /* 頂部全局功能列 */
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            padding: 0 8px;
        }

        .system-title {
            font-size: 24px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .global-save-btn {
            background-color: var(--success-color);
            color: white;
            border: 2px solid var(--border-color);
            padding: 12px 24px;
            font-size: 16px;
            font-weight: 700;
            border-radius: 12px;
            cursor: pointer;
            box-shadow: var(--shadow-style);
            display: flex;
            align-items: center;
            gap: 8px;
            transition: transform 0.1s;
        }
        .global-save-btn:active {
            transform: translate(2px, 2px);
            box-shadow: 2px 2px 0px #000000;
        }
        .global-save-btn.unsaved {
            background-color: var(--primary-accent);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.02); }
            100% { transform: scale(1); }
        }

        /* 主佈局容器 */
        .main-container {
            display: grid;
            grid-template-columns: 280px 420px 1fr;
            gap: 24px;
            align-items: start;
        }

        /* 通用區塊卡片外觀 */
        .panel-box {
            background-color: var(--card-bg);
            border: 2px solid var(--border-color);
            border-radius: 20px;
            padding: 24px;
            box-shadow: var(--shadow-style);
        }

        .panel-title {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        /* 管理導覽區塊 */
        .category-list {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .category-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 16px;
            border-radius: 12px;
            border: 2px solid transparent;
            cursor: pointer;
            font-weight: 500;
            transition: all 0.2s;
        }

        .category-item:hover {
            background-color: rgba(0,0,0,0.04);
        }

        .category-item.active {
            background-color: #ebe2d5;
            border-color: var(--border-color);
        }

        .category-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .category-count {
            background-color: rgba(0,0,0,0.08);
            padding: 2px 8px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 700;
        }

        .category-actions {
            display: none;
            gap: 8px;
        }
        .category-item:hover .category-actions {
            display: flex;
        }
        .category-actions i {
            color: #666;
            cursor: pointer;
            padding: 4px;
        }
        .category-actions i:hover {
            color: var(--primary-accent);
        }

        .add-category-inline {
            margin-top: 16px;
            padding-top: 16px;
            border-top: 2px dashed #ccc;
            display: flex;
            gap: 8px;
        }
        .add-category-inline input {
            flex: 1;
            padding: 8px 12px;
            border: 2px solid var(--border-color);
            border-radius: 8px;
            font-family: var(--font-family);
        }
        .add-category-inline button {
            background-color: var(--secondary-accent);
            border: 2px solid var(--border-color);
            border-radius: 8px;
            padding: 8px 12px;
            cursor: pointer;
            font-weight: 700;
        }

        /* 新增/編輯項目表單 */
        .form-group {
            margin-bottom: 16px;
        }

        .form-group label {
            display: block;
            font-weight: 700;
            font-size: 14px;
            margin-bottom: 8px;
        }

        .form-control {
            width: 100%;
            padding: 12px;
            border: 2px solid var(--border-color);
            border-radius: 12px;
            font-size: 14px;
            font-family: var(--font-family);
            background-color: white;
        }

        textarea.form-control {
            resize: vertical;
            min-height: 80px;
        }

        .upload-zone {
            border: 2px dashed var(--border-color);
            border-radius: 12px;
            padding: 16px;
            text-align: center;
            background-color: white;
            cursor: pointer;
            transition: background-color 0.2s;
        }
        .upload-zone:hover {
            background-color: #fafafa;
        }
        .upload-zone i {
            font-size: 24px;
            color: #666;
            margin-bottom: 8px;
        }
        .upload-zone p {
            font-size: 13px;
            font-weight: 500;
        }
        .cloud-link {
            display: inline-block;
            margin-top: 6px;
            font-size: 12px;
            color: #0066cc;
            text-decoration: none;
        }
        .cloud-link:hover {
            text-decoration: underline;
        }
        .preview-thumbnail {
            width: 100%;
            max-height: 120px;
            object-fit: cover;
            border-radius: 8px;
            border: 1px solid #ccc;
            margin-top: 8px;
            display: none;
        }

        .submit-btn {
            width: 100%;
            background-color: var(--border-color);
            color: white;
            padding: 14px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: background-color 0.2s;
            margin-top: 8px;
        }
        .submit-btn:hover {
            background-color: #333333;
        }

        /* 右側部分 */
        .right-section {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .filter-tags-row {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .filter-tag {
            background-color: white;
            border: 2px solid var(--border-color);
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
        }

        .filter-tag.active {
            background-color: var(--border-color);
            color: white;
        }

        /* 收藏項目卡片網格 */
        .items-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
        }

        .item-card {
            background-color: var(--card-bg);
            border: 2px solid var(--border-color);
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 4px 4px 0px #000000;
            display: flex;
            flex-direction: column;
        }

        .card-img {
            width: 100%;
            height: 160px;
            object-fit: cover;
            border-bottom: 2px solid var(--border-color);
            background-color: #eee;
        }

        .card-body {
            padding: 16px;
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .card-category {
            font-size: 12px;
            font-weight: 700;
            color: #666;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .card-title {
            font-size: 16px;
            font-weight: 700;
        }

        .card-comment-box {
            background-color: white;
            border: 2px solid var(--border-color);
            border-radius: 10px;
            padding: 10px;
            font-size: 13px;
            margin-top: 4px;
            flex: 1;
        }

        .card-footer-actions {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            border-top: 2px solid var(--border-color);
            background-color: white;
        }

        .card-action-btn {
            border: none;
            background: none;
            padding: 12px 4px;
            font-size: 13px;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 4px;
            color: var(--text-color);
            font-family: var(--font-family);
        }

        .card-action-btn:not(:last-child) {
            border-right: 2px solid var(--border-color);
        }

        .card-action-btn:hover {
            background-color: rgba(0,0,0,0.04);
        }

        .card-action-btn.delete-btn:hover {
            background-color: #fff0f0;
            color: #d32f2f;
        }

        #hidden-file-input {
            display: none;
        }
    </style>
</head>
<body>

    <div class="top-bar">
        <div class="system-title">
            <i class="fa-solid fa-box-archive"></i> 收藏與註解管理後台
        </div>
        <button class="global-save-btn" id="btn-global-save">
            <i class="fa-solid fa-cloud-arrow-up"></i> 一鍵儲存並同步至雲端
        </button>
    </div>

    <div class="main-container">
        
        <div class="panel-box">
            <div class="panel-title">
                <span>管理導覽</span>
                <i class="fa-solid fa-folder-gear" style="color: #666;"></i>
            </div>
            <ul class="category-list" id="category-ul">
                </ul>
            
            <div class="add-category-inline">
                <input type="text" id="new-cat-input" placeholder="新增分類名稱...">
                <button id="btn-add-cat"><i class="fa-solid fa-plus"></i></button>
            </div>
        </div>

        <div class="panel-box">
            <div class="panel-title" id="form-panel-title">新增項目</div>
            
            <form id="item-form">
                <div class="form-group">
                    <label>名稱 (連結或小說標題)</label>
                    <input type="text" class="form-control" id="item-name" placeholder="請輸入名稱" required>
                </div>

                <div class="form-group">
                    <label>連結網址 (選填，無則留白)</label>
                    <input type="url" class="form-control" id="item-url" placeholder="https://...">
                </div>

                <div class="form-group">
                    <label>上傳/選擇照片封面 (選填)</label>
                    <input type="file" id="hidden-file-input" accept="image/*">
                    <div class="upload-zone" id="drop-zone">
                        <i class="fa-solid fa-cloud-arrow-up"></i>
                        <p id="upload-status-text">點擊或拖曳圖片至此處上傳</p>
                        <img id="upload-preview" class="preview-thumbnail" alt="預覽圖">
                    </div>
                    <a href="#" class="cloud-link" target="_blank"><i class="fa-solid fa-images"></i> 點此開啟妳的雲端硬碟相簿</a>
                </div>

                <div class="form-group">
                    <label>選擇分類</label>
                    <select class="form-control" id="item-category">
                        </select>
                </div>

                <div class="form-group">
                    <label>小註解 | Personal Comments</label>
                    <textarea class="form-control" id="item-comment" placeholder="輸入妳的心得或註解..."></textarea>
                </div>

                <button type="submit" class="submit-btn" id="btn-submit-form">確認新增儲存</button>
                <button type="button" class="submit-btn" id="btn-cancel-edit" style="background-color: #888; display: none; margin-top: 8px;">取消編輯</button>
            </form>
        </div>

        <div class="right-section">
            <div class="filter-tags-row" id="filter-tags-container">
                </div>

            <div class="items-grid" id="items-grid-container">
                </div>
        </div>

    </div>

    <script>
    const GAS_WEB_APP_URL = "https://script.google.com/macros/s/AKfycbwWgfzw6d_Kk5osOblW1_azjz4sDelYnTj6ilTu9y1sxi6kVF_2MVOby9h7ndJQ47K80Q/exec"; 
    
    let categories = [
        { id: "gourmet", name: "美食拉", icon: "fa-utensils" },
        { id: "hotel", name: "住宿", icon: "fa-bed" },
        { id: "novel", name: "小說/註解", icon: "fa-book" },
        { id: "husband", name: "老公的", icon: "fa-folder" }
    ];

    // 統一從 localStorage 讀取初始化資料
    let collections = JSON.parse(localStorage.getItem('myLinks')) || [
        { id: "item_1", name: "我測試用", url: "", category: "husband", comment: "", img: "" },
        { id: "item_2", name: "赤丸椰子", url: "https://example.com", category: "gourmet", comment: "台北中山赤丸椰子，味道濃郁！", img: "https://images.unsplash.com/photo-1555396273-367ea4eb4db5?auto=format&fit=crop&w=400&q=80" }
    ];

    let currentFilter = "all";
    let editTargetId = null;
    let currentUploadedImgBase64 = "";

    // === 新增：確保隨時存入 localStorage ===
    function saveToLocal() {
        localStorage.setItem('myLinks', JSON.stringify(collections));
    }

    // === 修正：渲染系統 ===
    function renderSystem() {
        renderCategories();
        renderCategorySelect();
        renderFilterTags();
        renderCards();
    }

    // ... (renderCategories, renderCategorySelect, renderFilterTags, renderCards 保持不變) ...

    // === 修正：表單提交邏輯 ===
    document.getElementById('item-form').addEventListener('submit', function(e) {
        e.preventDefault();
        // ... (原有的新增/編輯邏輯) ...
        
        saveToLocal(); // 新增這行：每次變動立刻存到 localStorage
        markUnsaved(); 
        renderSystem();
    });

    // === 修正：雲端存檔邏輯 ===
    window.handleCloudSaveResponse = function(res) {
        const btn = document.getElementById('btn-global-save');
        btn.classList.remove('unsaved');
        btn.innerHTML = `<i class="fa-solid fa-cloud-arrow-up"></i> 一鍵儲存並同步至雲端`;
        alert(res.status === "success" ? "🎉 同步成功！" : "❌ 同步失敗");
    };

    document.getElementById('btn-global-save').addEventListener('click', function() {
        const encodedData = encodeURIComponent(JSON.stringify(collections)); // 使用 collections
        const script = document.createElement('script');
        script.src = `${GAS_WEB_APP_URL}?action=save&data=${encodedData}&callback=handleCloudSaveResponse&_=${Date.now()}`;
        document.body.appendChild(script);
    });

    // === 修正：雲端讀取邏輯 ===
    window.handleCloudData = function(res) {
        if (res && res.status === "success" && res.data) {
            collections = res.data; // 關鍵修正：將雲端資料賦值給 collections
            saveToLocal();          // 同步到本地
            renderSystem();
        }
    };

    function initializeSystemFromCloud() {
        const script = document.createElement('script');
        script.src = `${GAS_WEB_APP_URL}?callback=handleCloudData&_=${Date.now()}`;
        document.body.appendChild(script);
    }

    initializeSystemFromCloud();
    renderSystem();
</script>
</body>
</html>
