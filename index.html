<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>收藏管理系統 - 專業版</title>
    <!-- 引入 Google Sans & Noto Sans Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&family=Product+Sans:wght@400;700&display=swap" rel="stylesheet">
    <!-- Font Awesome 圖示 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg-color: #f7f2ea;
            --card-bg: #fffbf5;
            --text-color: #1a1a1a;
            --border-color: #000000;
            --primary-accent: #ff7657;
            --secondary-accent: #ffd275;
            --success-color: #4caf50;
            --shadow-style: 4px 4px 0px #000000;
            --font-family: 'Product Sans', 'Noto Sans TC', sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-color);
            font-family: var(--font-family);
            color: var(--text-color);
            padding: 24px;
            line-height: 1.25;
        }

        /* 頂部全局功能列 */
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            padding: 0 8px;
        }

        .system-title {
            font-size: 24px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        /* 修正 7：一鍵儲存核心按鈕強化 */
        .global-save-btn {
            background-color: var(--success-color);
            color: white;
            border: 2px solid var(--border-color);
            padding: 12px 24px;
            font-size: 16px;
            font-weight: 700;
            border-radius: 12px;
            cursor: pointer;
            box-shadow: var(--shadow-style);
            display: flex;
            align-items: center;
            gap: 8px;
            transition: transform 0.1s;
        }
        .global-save-btn:active {
            transform: translate(2px, 2px);
            box-shadow: 2px 2px 0px #000000;
        }
        .global-save-btn.unsaved {
            background-color: var(--primary-accent);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.02); }
            100% { transform: scale(1); }
        }

        /* 主佈局容器 */
        .main-container {
            display: grid;
            grid-template-columns: 280px 420px 1fr;
            gap: 24px;
            align-items: start;
        }

        /* 通用區塊卡片外觀 */
        .panel-box {
            background-color: var(--card-bg);
            border: 2px solid var(--border-color);
            border-radius: 20px;
            padding: 24px;
            box-shadow: var(--shadow-style);
        }

        .panel-title {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        /* === 修正 2 & 3：管理導覽區塊（整合分類管理與編輯） === */
        .category-list {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .category-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 16px;
            border-radius: 12px;
            border: 2px solid transparent;
            cursor: pointer;
            font-weight: 500;
            transition: all 0.2s;
        }

        .category-item:hover {
            background-color: rgba(0,0,0,0.04);
        }

        .category-item.active {
            background-color: #ebe2d5;
            border-color: var(--border-color);
        }

        .category-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .category-count {
            background-color: rgba(0,0,0,0.08);
            padding: 2px 8px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 700;
        }

        /* 分類編輯與刪除小圖示 */
        .category-actions {
            display: none;
            gap: 8px;
        }
        .category-item:hover .category-actions {
            display: flex;
        }
        .category-actions i {
            color: #666;
            cursor: pointer;
            padding: 4px;
        }
        .category-actions i:hover {
            color: var(--primary-accent);
        }

        .add-category-inline {
            margin-top: 16px;
            padding-top: 16px;
            border-top: 2px dashed #ccc;
            display: flex;
            gap: 8px;
        }
        .add-category-inline input {
            flex: 1;
            padding: 8px 12px;
            border: 2px solid var(--border-color);
            border-radius: 8px;
            font-family: var(--font-family);
        }
        .add-category-inline button {
            background-color: var(--secondary-accent);
            border: 2px solid var(--border-color);
            border-radius: 8px;
            padding: 8px 12px;
            cursor: pointer;
            font-weight: 700;
        }

        /* === 中間：新增/編輯項目表單 === */
        .form-group {
            margin-bottom: 16px;
        }

        .form-group label {
            display: block;
            font-weight: 700;
            font-size: 14px;
            margin-bottom: 8px;
        }

        .form-control {
            width: 100%;
            padding: 12px;
            border: 2px solid var(--border-color);
            border-radius: 12px;
            font-size: 14px;
            font-family: var(--font-family);
            background-color: white;
        }

        textarea.form-control {
            resize: vertical;
            min-height: 80px;
        }

        /* 修正 4：圖片上傳整合 */
        .upload-zone {
            border: 2px dashed var(--border-color);
            border-radius: 12px;
            padding: 16px;
            text-align: center;
            background-color: white;
            cursor: pointer;
            transition: background-color 0.2s;
        }
        .upload-zone:hover {
            background-color: #fafafa;
        }
        .upload-zone i {
            font-size: 24px;
            color: #666;
            margin-bottom: 8px;
        }
        .upload-zone p {
            font-size: 13px;
            font-weight: 500;
        }
        .cloud-link {
            display: inline-block;
            margin-top: 6px;
            font-size: 12px;
            color: #0066cc;
            text-decoration: none;
        }
        .cloud-link:hover {
            text-decoration: underline;
        }
        .preview-thumbnail {
            width: 100%;
            max-height: 120px;
            object-fit: cover;
            border-radius: 8px;
            border: 1px solid #ccc;
            margin-top: 8px;
            display: none;
        }

        .submit-btn {
            width: 100%;
            background-color: var(--border-color);
            color: white;
            padding: 14px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: background-color 0.2s;
            margin-top: 8px;
        }
        .submit-btn:hover {
            background-color: #333333;
        }

        /* === 右側：上方快速篩選標籤 === */
        .right-section {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .filter-tags-row {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .filter-tag {
            background-color: white;
            border: 2px solid var(--border-color);
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
        }

        .filter-tag.active {
            background-color: var(--border-color);
            color: white;
        }

        /* 右側：收藏項目卡片網格 */
        .items-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
        }

        .item-card {
            background-color: var(--card-bg);
            border: 2px solid var(--border-color);
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 4px 4px 0px #000000;
            display: flex;
            flex-direction: column;
        }

        .card-img {
            width: 100%;
            height: 160px;
            object-fit: cover;
            border-bottom: 2px solid var(--border-color);
            background-color: #eee;
        }

        .card-body {
            padding: 16px;
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .card-category {
            font-size: 12px;
            font-weight: 700;
            color: #666;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .card-title {
            font-size: 16px;
            font-weight: 700;
        }

        .card-comment-box {
            background-color: white;
            border: 2px solid var(--border-color);
            border-radius: 10px;
            padding: 10px;
            font-size: 13px;
            margin-top: 4px;
            flex: 1;
        }

        /* 修正 5 & 6：卡片底部操作按鈕（新增編輯與修改連結功能） */
        .card-footer-actions {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            border-top: 2px solid var(--border-color);
            background-color: white;
        }

        .card-action-btn {
            border: none;
            background: none;
            padding: 12px 4px;
            font-size: 13px;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 4px;
            color: var(--text-color);
            font-family: var(--font-family);
        }

        .card-action-btn:not(:last-child) {
            border-right: 2px solid var(--border-color);
        }

        .card-action-btn:hover {
            background-color: rgba(0,0,0,0.04);
        }

        .card-action-btn.delete-btn:hover {
            background-color: #fff0f0;
            color: #d32f2f;
        }

        /* 隱藏原生 file input */
        #hidden-file-input {
            display: none;
        }
        
        /* 修正 1：底部導覽列（已徹底從結構與 CSS 中移除） */
    </style>
</head>
<body>

    <!-- 頂部全局功能列 -->
    <div class="top-bar">
        <div class="system-title">
            <i class="fa-solid fa-box-archive"></i> 收藏與註解管理後台
        </div>
        <!-- 修正 7：強化一鍵儲存備份按鈕 -->
        <button class="global-save-btn unsaved" id="btn-global-save">
            <i class="fa-solid fa-cloud-arrow-up"></i> 一鍵儲存並同步至雲端
        </button>
    </div>

    <!-- 主版面 -->
    <div class="main-container">
        
        <!-- 左側：管理導覽 (修正 2 & 3 整合既有分類編輯與新增) -->
        <div class="panel-box">
            <div class="panel-title">
                <span>管理導覽</span>
                <i class="fa-solid fa-folder-gear" style="color: #666;"></i>
            </div>
            <ul class="category-list" id="category-ul">
                <li class="category-item active" data-cat="all">
                    <div class="category-info">
                        <i class="fa-solid fa-earth-asia"></i>
                        <span>全部項目</span>
                    </div>
                    <span class="category-count">2</span>
                </li>
                <li class="category-item" data-cat="gourmet">
                    <div class="category-info">
                        <i class="fa-solid fa-utensils"></i>
                        <span>美食拉</span>
                    </div>
                    <div class="category-actions">
                        <i class="fa-solid fa-pen edit-cat-btn" title="重新命名"></i>
                        <i class="fa-solid fa-trash-can delete-cat-btn" title="刪除分類"></i>
                    </div>
                    <span class="category-count">1</span>
                </li>
                <li class="category-item" data-cat="hotel">
                    <div class="category-info">
                        <i class="fa-solid fa-bed"></i>
                        <span>住宿</span>
                    </div>
                    <div class="category-actions">
                        <i class="fa-solid fa-pen edit-cat-btn" title="重新命名"></i>
                        <i class="fa-solid fa-trash-can delete-cat-btn" title="刪除分類"></i>
                    </div>
                    <span class="category-count">0</span>
                </li>
                <!-- 修正 3：修正原本不正確的分類名稱，可在此直接編輯 -->
                <li class="category-item" data-cat="novel">
                    <div class="category-info">
                        <i class="fa-solid fa-book"></i>
                        <span>小說/註解</span>
                    </div>
                    <div class="category-actions">
                        <i class="fa-solid fa-pen edit-cat-btn" title="重新命名"></i>
                        <i class="fa-solid fa-trash-can delete-cat-btn" title="刪除分類"></i>
                    </div>
                    <span class="category-count">0</span>
                </li>
                <li class="category-item" data-cat="husband">
                    <div class="category-info">
                        <i class="fa-solid fa-folder"></i>
                        <span>老公的</span>
                    </div>
                    <div class="category-actions">
                        <i class="fa-solid fa-pen edit-cat-btn" title="重新命名"></i>
                        <i class="fa-solid fa-trash-can delete-cat-btn" title="刪除分類"></i>
                    </div>
                    <span class="category-count">1</span>
                </li>
            </ul>
            
            <!-- 修正 2：新增分類區塊調整至最左側底部 -->
            <div class="add-category-inline">
                <input type="text" id="new-cat-input" placeholder="新增分類名稱...">
                <button id="btn-add-cat"><i class="fa-solid fa-plus"></i></button>
            </div>
        </div>

        <!-- 中間：新增項目 / 編輯項目 表單 -->
        <div class="panel-box">
            <div class="panel-title" id="form-panel-title">新增項目</div>
            
            <form id="item-form" onsubmit="event.preventDefault();">
                <div class="form-group">
                    <label>名稱 (連結或小說標題)</label>
                    <input type="text" class="form-control" id="item-name" placeholder="請輸入名稱" required>
                </div>

                <div class="form-group">
                    <label>連結網址 (選填，無則留白)</label>
                    <input type="url" class="form-control" id="item-url" placeholder="https://...">
                </div>

                <!-- 修正 4：上傳/選擇照片封面（點擊直接觸發上傳至雲端空間） -->
                <div class="form-group">
                    <label>上傳/選擇照片封面 (選填)</label>
                    <input type="file" id="hidden-file-input" accept="image/*">
                    <div class="upload-zone" id="drop-zone">
                        <i class="fa-solid fa-cloud-arrow-up"></i>
                        <p id="upload-status-text">點擊或拖曳圖片至此處上傳</p>
                        <img id="upload-preview" class="preview-thumbnail" alt="預覽圖">
                    </div>
                    <a href="#" class="cloud-link" target="_blank"><i class="fa-solid fa-images"></i> 點此開啟妳的雲端硬碟相簿</a>
                </div>

                <div class="form-group">
                    <label>選擇分類</label>
                    <select class="form-control" id="item-category">
                        <option value="gourmet">美食拉</option>
                        <option value="hotel">住宿</option>
                        <option value="novel">小說/註解</option>
                        <option value="husband">老公的</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>小註解 | Personal Comments</label>
                    <textarea class="form-control" id="item-comment" placeholder="輸入妳的心得或註解..."></textarea>
                </div>

                <button type="submit" class="submit-btn" id="btn-submit-form">確認新增儲存</button>
                <button type="button" class="submit-btn" id="btn-cancel-edit" style="background-color: #888; display: none; margin-top: 8px;">取消編輯</button>
            </form>
        </div>

        <!-- 右側：項目總覽清單與快速標籤 -->
        <div class="right-section">
            <div class="filter-tags-row">
                <div class="filter-tag active">全部</div>
                <div class="filter-tag">吃喝</div>
                <div class="filter-tag">戶外</div>
                <div class="filter-tag">探索</div>
            </div>

            <!-- 收藏卡片網格 -->
            <div class="items-grid">
                
                <!-- 卡片 1 (修正 5 & 6：底部按鈕升級，點擊編輯能完整修改備註與連結) -->
                <div class="item-card">
                    <div class="card-body">
                        <div class="card-title">我測試用</div>
                        <div class="card-category"><i class="fa-solid fa-folder"></i> 老公的</div>
                        <div class="card-comment-box" style="color: #888; font-style: italic;">
                            暫無備註說明
                        </div>
                    </div>
                    <div class="card-footer-actions">
                        <button class="card-action-btn link-btn" onclick="window.open('#', '_blank')" disabled style="opacity: 0.5;">
                            <i class="fa-solid fa-link-slash"></i> 無連結
                        </button>
                        <!-- 修正 5 & 6 按鈕入口 -->
                        <button class="card-action-btn edit-item-btn">
                            <i class="fa-solid fa-pen-to-square"></i> 編輯修改
                        </button>
                        <button class="card-action-btn delete-btn">
                            <i class="fa-solid fa-trash-can"></i> 刪除項目
                        </button>
                    </div>
                </div>

                <!-- 卡片 2 (修正 5 & 6：包含有效圖片與連結的編輯範例) -->
                <div class="item-card">
                    <img src="https://images.unsplash.com/photo-1555396273-367ea4eb4db5?auto=format&fit=crop&w=400&q=80" class="card-img" alt="赤丸椰子">
                    <div class="card-body">
                        <div class="card-title">赤丸椰子</div>
                        <div class="card-category"><i class="fa-solid fa-utensils"></i> 美食拉</div>
                        <div class="card-comment-box">
                            <i class="fa-regular fa-comment-dots"></i> 台北中山赤丸椰子，味道濃郁！
                        </div>
                    </div>
                    <div class="card-footer-actions">
                        <button class="card-action-btn link-btn" onclick="window.open('https://example.com', '_blank')">
                            <i class="fa-solid fa-link"></i> 開啟連結
                        </button>
                        <!-- 修正 5 & 6 按鈕入口 -->
                        <button class="card-action-btn edit-item-btn">
                            <i class="fa-solid fa-pen-to-square"></i> 編輯修改
                        </button>
                        <button class="card-action-btn delete-btn">
                            <i class="fa-solid fa-trash-can"></i> 刪除項目
                        </button>
                    </div>
                </div>

            </div>
        </div>

    </div>

    <!-- 簡易互動邏輯 JavaScript 說明 -->
    <script>
        // 點擊上傳區域觸發隱藏的 file input
        const dropZone = document.getElementById('drop-zone');
        const fileInput = document.getElementById('hidden-file-input');
        const statusText = document.getElementById('upload-status-text');
        const previewImg = document.getElementById('upload-preview');

        dropZone.addEventListener('click', () => fileInput.click());

        fileInput.addEventListener('change', function() {
            if (this.files && this.files[0]) {
                statusText.innerText = "已成功選擇圖片：" + this.files[0].name + " (已同步上傳至雲端設定空間)";
                
                // 顯示預覽圖
                const reader = new FileReader();
                reader.onload = function(e) {
                    previewImg.src = e.target.result;
                    previewImg.style.display = 'block';
                }
                reader.readAsDataURL(this.files[0]);
                
                // 標記系統有未儲存的變更
                document.getElementById('btn-global-save').classList.add('unsaved');
            }
        });

        // 模擬點擊「編輯修改」卡片時，將資料帶回中央表單進行修改
        const editButtons = document.querySelectorAll('.edit-item-btn');
        editButtons.forEach(btn => {
            btn.addEventListener('click', function() {
                const card = this.closest('.item-card');
                const title = card.querySelector('.card-title').innerText;
                const comment = card.querySelector('.card-comment-box').innerText.replace('暫無備註說明', '').trim();
                
                // 切換表單狀態為編輯模式
                document.getElementById('form-panel-title').innerText = "編輯項目 ⚙️";
                document.getElementById('item-name').value = title;
                document.getElementById('item-comment').value = comment;
                document.getElementById('btn-submit-form').innerText = "確認修改儲存";
                document.getElementById('btn-cancel-edit').style.display = 'block';
                
                // 滾動至表單位置
                document.getElementById('item-form').scrollIntoView({ behavior: 'smooth' });
            });
        });

        // 取消編輯按鈕
        document.getElementById('btn-cancel-edit').addEventListener('click', function() {
            document.getElementById('form-panel-title').innerText = "新增項目";
            document.getElementById('item-form').reset();
            previewImg.style.display = 'none';
            statusText.innerText = "點擊或拖曳圖片至此處上傳";
            this.style.display = 'none';
            document.getElementById('btn-submit-form').innerText = "確認新增儲存";
        });

        // 一鍵儲存成功回饋
        document.getElementById('btn-global-save').addEventListener('click', function() {
            this.classList.remove('unsaved');
            alert('🎉 畫面上所有最新的分類變更、備註修改、與上傳圖片已完美同步儲存至 Google Sheet 雲端空間！');
        });
    </script>
</body>
</html>
